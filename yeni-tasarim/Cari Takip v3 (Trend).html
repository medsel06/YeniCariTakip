<!doctype html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Cari Takip — Trend</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root[data-theme="dark"] {
  --bg: #0a0a0b;
  --bg-2: #101012;
  --panel: #131316;
  --panel-2: #18181c;
  --panel-hover: #1c1c20;
  --border: #25252a;
  --border-2: #2e2e34;
  --text: #f4f4f5;
  --text-2: #a1a1a6;
  --text-3: #6e6e76;
  --accent: #a3e635;
  --accent-soft: rgba(163,230,53,0.12);
  --accent-ink: #d9f99d;
  --accent-glow: rgba(163,230,53,0.25);
  --good: #4ade80;
  --good-soft: rgba(74,222,128,0.12);
  --bad: #f87171;
  --bad-soft: rgba(248,113,113,0.12);
  --warn: #fbbf24;
  --warn-soft: rgba(251,191,36,0.12);
  --info: #60a5fa;
  --info-soft: rgba(96,165,250,0.12);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
  --shadow-lg: 0 24px 48px rgba(0,0,0,0.5), 0 8px 16px rgba(0,0,0,0.3);
  color-scheme: dark;
}
:root[data-theme="light"] {
  --bg: #fafafa;
  --bg-2: #f4f4f5;
  --panel: #ffffff;
  --panel-2: #fafafa;
  --panel-hover: #f4f4f5;
  --border: #e4e4e7;
  --border-2: #d4d4d8;
  --text: #18181b;
  --text-2: #52525b;
  --text-3: #a1a1aa;
  --accent: #65a30d;
  --accent-soft: rgba(101,163,13,0.08);
  --accent-ink: #4d7c0f;
  --accent-glow: rgba(101,163,13,0.15);
  --good: #16a34a;
  --good-soft: rgba(22,163,74,0.08);
  --bad: #dc2626;
  --bad-soft: rgba(220,38,38,0.08);
  --warn: #ca8a04;
  --warn-soft: rgba(202,138,4,0.08);
  --info: #2563eb;
  --info-soft: rgba(37,99,235,0.08);
  --shadow-md: 0 4px 14px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 24px 48px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.05);
  color-scheme: light;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg); color: var(--text);
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  font-size: 13.5px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.01em;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
}
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font: inherit; color: inherit; }
.num { font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.03em; }
svg { display: block; }
::selection { background: var(--accent-soft); color: var(--accent-ink); }

#root { display: flex; min-height: 100vh; position: relative; }

/* Subtle ambient gradient */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, var(--accent-soft), transparent 70%),
    radial-gradient(ellipse 50% 30% at 90% 110%, var(--info-soft), transparent 70%);
  opacity: 0.6;
}
#root > * { position: relative; z-index: 1; }

/* ============= SIDEBAR ============= */
.sb {
  width: 232px; flex-shrink: 0;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  padding: 12px 10px;
}
.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px 16px;
}
.sb-logo {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, #84cc16 100%);
  color: #0a0a0b; display: grid; place-items: center;
  font-weight: 700; font-size: 13px; letter-spacing: -0.02em;
  box-shadow: 0 0 0 1px rgba(163,230,53,0.3), 0 4px 12px var(--accent-glow);
}
.sb-brand-name { font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
.sb-brand-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.sb-search {
  margin: 0 6px 12px;
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 7px;
  background: var(--panel);
  border: 1px solid var(--border);
  font-size: 12.5px; color: var(--text-3);
  cursor: pointer; transition: all 0.15s;
}
.sb-search:hover { background: var(--panel-2); color: var(--text-2); border-color: var(--border-2); }
.sb-search kbd {
  margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px;
  padding: 1px 5px; background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text-3);
}
.sb-group { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); padding: 14px 12px 6px; font-weight: 500; }
.sb-nav { display: flex; flex-direction: column; gap: 1px; }
.sb-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px; border-radius: 7px;
  color: var(--text-2); font-size: 13px; font-weight: 450;
  width: 100%; text-align: left;
  transition: all 0.1s;
}
.sb-item:hover { background: var(--panel); color: var(--text); }
.sb-item.active { background: var(--panel); color: var(--text); font-weight: 500; box-shadow: inset 0 0 0 1px var(--border); }
.sb-item svg { color: var(--text-3); flex-shrink: 0; }
.sb-item.active svg { color: var(--accent); }
.sb-item .badge {
  margin-left: auto; font-size: 10.5px; color: var(--text-3);
  font-family: 'JetBrains Mono', monospace; padding: 1px 5px;
  background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px;
}

.sb-foot { margin-top: auto; padding: 10px 8px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 9px; }
.av {
  width: 28px; height: 28px; border-radius: 7px;
  background: linear-gradient(135deg, #f59e0b, #ef4444);
  color: #fff; display: grid; place-items: center;
  font-weight: 600; font-size: 11px; flex-shrink: 0;
}
.sb-user { font-size: 12.5px; font-weight: 500; }
.sb-role { font-size: 10.5px; color: var(--text-3); margin-top: 1px; }

/* ============= MAIN ============= */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.tb {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 28px;
  background: rgba(10,10,11,0.7);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 20;
}
:root[data-theme="light"] .tb { background: rgba(250,250,250,0.7); }
.tb-crumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-3); }
.tb-crumb b { color: var(--text); font-weight: 500; }
.tb-spacer { flex: 1; }

.content { flex: 1; padding: 24px 28px 56px; overflow-x: auto; }
.wrap { max-width: 1480px; margin: 0 auto; }

/* ============= BUTTONS ============= */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 11px; border-radius: 7px;
  font-size: 12.5px; font-weight: 500;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  transition: all 0.12s;
  height: 30px;
}
.btn:hover { background: var(--panel-hover); border-color: var(--border-2); }
.btn-primary {
  background: var(--accent); color: #0a0a0b; border-color: var(--accent);
  font-weight: 600;
}
.btn-primary:hover { filter: brightness(1.1); border-color: var(--accent); color: #0a0a0b; }
.btn-good { background: var(--good); color: #0a0a0b; border-color: var(--good); font-weight: 600; }
.btn-bad { background: var(--bad); color: #fff; border-color: var(--bad); font-weight: 600; }
.btn-bad:hover { filter: brightness(1.1); color: #fff; }
.btn-ghost { background: transparent; border-color: transparent; color: var(--text-2); }
.btn-ghost:hover { background: var(--panel); color: var(--text); border-color: transparent; }
.btn-icon { padding: 0; width: 30px; justify-content: center; }
.btn-sm { height: 26px; padding: 4px 9px; font-size: 12px; }

/* ============= CARDS ============= */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.card-hd { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.card-ttl { font-size: 13.5px; font-weight: 600; letter-spacing: -0.015em; }
.card-sub { font-size: 11.5px; color: var(--text-3); margin-top: 2px; font-weight: 400; }

/* ============= KPI ============= */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
.kpi {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  position: relative; overflow: hidden;
}
.kpi-icon-wrap {
  width: 30px; height: 30px; border-radius: 7px;
  display: grid; place-items: center;
  background: var(--bg-2); border: 1px solid var(--border);
  color: var(--text-2);
  position: absolute; top: 14px; right: 14px;
}
.kpi-label { font-size: 12px; color: var(--text-2); font-weight: 500; }
.kpi-val {
  font-family: 'Inter', sans-serif;
  font-size: 26px; font-weight: 600;
  margin-top: 8px; line-height: 1.1;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}
.kpi-val .suf { font-size: 14px; color: var(--text-3); font-weight: 500; margin-left: 2px; }
.kpi-delta { font-size: 11.5px; color: var(--text-3); margin-top: 8px; display: flex; align-items: center; gap: 4px; }
.kpi-delta.up { color: var(--good); }
.kpi-delta.dn { color: var(--bad); }
.kpi-pill {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 1px 6px; border-radius: 999px;
  font-size: 10.5px; font-weight: 600;
  background: var(--good-soft); color: var(--good);
}
.kpi-pill.dn { background: var(--bad-soft); color: var(--bad); }

/* ============= TABLE ============= */
.tbl-wrap { overflow-x: auto; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
table.tbl thead th {
  text-align: left; padding: 9px 14px;
  font-size: 11px; font-weight: 500; color: var(--text-3);
  background: var(--panel-2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
:root[data-theme="dark"] table.tbl thead th { background: rgba(255,255,255,0.015); }
table.tbl tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
table.tbl tbody tr { transition: background 0.08s; }
table.tbl tbody tr:hover { background: var(--panel-hover); cursor: pointer; }
table.tbl tbody tr:last-child td { border-bottom: none; }
.r { text-align: right; }
.tnum { font-variant-numeric: tabular-nums; text-align: right; letter-spacing: -0.02em; }
.tdate { font-variant-numeric: tabular-nums; color: var(--text-2); font-size: 12px; letter-spacing: -0.02em; }
.tref { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-3); }

/* ============= CHIPS ============= */
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 5px;
  font-size: 11px; font-weight: 500;
  white-space: nowrap;
  border: 1px solid;
}
.chip-dot { width: 5px; height: 5px; border-radius: 50%; }
.c-good { background: var(--good-soft); color: var(--good); border-color: rgba(74,222,128,0.2); }
.c-good .chip-dot { background: var(--good); }
.c-bad { background: var(--bad-soft); color: var(--bad); border-color: rgba(248,113,113,0.2); }
.c-bad .chip-dot { background: var(--bad); }
.c-warn { background: var(--warn-soft); color: var(--warn); border-color: rgba(251,191,36,0.2); }
.c-warn .chip-dot { background: var(--warn); }
.c-info { background: var(--info-soft); color: var(--info); border-color: rgba(96,165,250,0.2); }
.c-info .chip-dot { background: var(--info); }
.c-accent { background: var(--accent-soft); color: var(--accent); border-color: rgba(163,230,53,0.2); }
.c-accent .chip-dot { background: var(--accent); }
.c-mute { background: var(--bg-2); color: var(--text-2); border-color: var(--border); }
.c-mute .chip-dot { background: var(--text-3); }

.balance {
  display: inline-flex; align-items: baseline; gap: 8px;
  padding: 6px 12px; border-radius: 8px;
  background: var(--accent-soft);
  border: 1px solid rgba(163,230,53,0.2);
}
.balance .bl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); opacity: 0.85; }
.balance .bv { font-size: 14px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.balance.neg { background: var(--bad-soft); border-color: rgba(248,113,113,0.2); }
.balance.neg .bl, .balance.neg .bv { color: var(--bad); }
.balance.zero { background: var(--bg-2); border-color: var(--border); }
.balance.zero .bl, .balance.zero .bv { color: var(--text-2); }

/* ============= FILTERBAR ============= */
.fbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.flt {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-radius: 7px; height: 30px;
  border: 1px solid var(--border); background: var(--panel);
  font-size: 12.5px; font-weight: 500; color: var(--text);
}
.flt:hover { border-color: var(--border-2); }
.flt.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
.flt.on svg { color: var(--accent); }
.flt svg { color: var(--text-3); }
.flt select { border: none; background: transparent; outline: none; cursor: pointer; color: inherit; font-weight: 500; appearance: none; padding-right: 12px; }

.seg { display: inline-flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; background: var(--panel); height: 30px; }
.seg button { padding: 5px 11px; font-size: 12px; font-weight: 500; color: var(--text-2); border-right: 1px solid var(--border); transition: all 0.1s; }
.seg button:last-child { border-right: none; }
.seg button:hover { background: var(--panel-hover); color: var(--text); }
.seg button.on { background: var(--accent); color: #0a0a0b; font-weight: 600; }

.input-search {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 7px; height: 30px;
  border: 1px solid var(--border); background: var(--panel);
  width: 240px;
}
.input-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.input-search input { flex: 1; border: none; background: none; outline: none; font-size: 12.5px; }
.input-search input::placeholder { color: var(--text-3); }

/* ============= MODAL ============= */
.scrim {
  position: fixed !important; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  display: grid; place-items: center;
  z-index: 100;
  animation: fade 0.18s;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes slide { from { opacity: 0; transform: translateY(8px) scale(0.99); } to { opacity: 1; transform: none; } }
.modal {
  background: var(--panel); border-radius: 12px; border: 1px solid var(--border);
  width: 520px; max-width: calc(100vw - 32px); max-height: calc(100vh - 32px);
  box-shadow: var(--shadow-lg);
  overflow: hidden; display: flex; flex-direction: column;
  animation: slide 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}
.m-hd { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.m-ttl { font-size: 15px; font-weight: 600; letter-spacing: -0.015em; }
.m-sub { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }
.m-bd { padding: 18px 20px; overflow-y: auto; }
.m-ft { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; background: var(--panel-2); }

.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 11px; font-weight: 500; color: var(--text-2); }
.field input, .field select, .field textarea {
  padding: 8px 11px; border: 1px solid var(--border); border-radius: 7px;
  background: var(--panel-2); font-size: 13px; outline: none;
  transition: all 0.12s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.tp { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tp label {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; transition: all 0.12s;
  background: var(--panel-2);
}
.tp label:hover { border-color: var(--border-2); }
.tp input { display: none; }
.tp label:has(input:checked) { border-color: var(--accent); background: var(--accent-soft); }
.tp-ic { width: 28px; height: 28px; border-radius: 7px; background: var(--bg-2); display: grid; place-items: center; color: var(--text-2); flex-shrink: 0; border: 1px solid var(--border); }
.tp label:has(input:checked) .tp-ic { background: var(--accent); color: #0a0a0b; border-color: var(--accent); }
.tp label:has(input[value="payment"]:checked) { border-color: var(--bad); background: var(--bad-soft); }
.tp label:has(input[value="payment"]:checked) .tp-ic { background: var(--bad); color: #fff; border-color: var(--bad); }
.tp-ttl { font-size: 13px; font-weight: 600; }
.tp-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }

/* ============= TWEAKS ============= */
.tw { position: fixed !important; bottom: 18px; right: 18px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow-lg); padding: 12px 14px; display: flex; align-items: center; gap: 14px; z-index: 90; animation: slide 0.2s; }
.tw-ttl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); }
.tg { position: relative; width: 32px; height: 18px; background: var(--border-2); border-radius: 999px; cursor: pointer; transition: background 0.2s; }
.tg::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
.tg.on { background: var(--accent); }
.tg.on::after { transform: translateX(14px); }

/* ============= LAYOUT ============= */
.two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 14px; }
.rp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* Top customers */
.tc-row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
.tc-row:hover { background: var(--panel-hover); cursor: pointer; }
.tc-row:last-child { border-bottom: none; }
.tc-rank { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-3); width: 22px; }
.tc-name { flex: 1; font-weight: 500; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tc-bar { width: 90px; height: 3px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
.tc-fill { height: 100%; background: var(--accent); }
.tc-val { font-variant-numeric: tabular-nums; font-size: 12px; font-weight: 600; width: 100px; text-align: right; letter-spacing: -0.02em; }

/* Detail hero */
.hero { padding: 22px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 18px; }
.hero-av {
  width: 50px; height: 50px; border-radius: 11px;
  background: linear-gradient(135deg, var(--accent), #84cc16);
  color: #0a0a0b; display: grid; place-items: center;
  font-weight: 700; font-size: 16px; flex-shrink: 0; letter-spacing: -0.02em;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.hero-name { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; }
.hero-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 7px; font-size: 12px; color: var(--text-2); }
.hero-meta span { display: flex; align-items: center; gap: 5px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--border); }
.stat { padding: 14px 20px; border-right: 1px solid var(--border); }
.stat:last-child { border-right: none; }
.stat-l { font-size: 11px; color: var(--text-3); font-weight: 500; }
.stat-v { font-size: 18px; font-weight: 600; margin-top: 5px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.stat-s { font-size: 11px; color: var(--text-3); margin-top: 3px; }

// API çağrı helper'ı
async function apiGet(path) {
  try {
    const r = await fetch(path, { credentials: 'same-origin' });
    if (r.status === 401) { window.location.href = '/login'; return null; }
    if (!r.ok) { console.error('API error', path, r.status); return null; }
    return await r.json();
  } catch (e) {
    console.error('Fetch error', path, e); return null;
  }
}
async function apiPost(path, data) {
  try {
    const r = await fetch(path, {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (r.status === 401) { window.location.href = '/login'; return null; }
    return await r.json();
  } catch (e) {
    console.error('Post error', path, e); return null;
  }
}
window.apiGet = apiGet; window.apiPost = apiPost;

    <span className="bl">{lbl}</span><span className="bv" style={sz==='lg'?{fontSize:15}:{}}>{fmt(Math.abs(v))}</span>
  </span>;
}
function Chip({k,children,dot=true}){return <span className={`chip c-${k}`}>{dot&&<span className="chip-dot"/>}{children}</span>;}
function DocChip({type}){return <Chip k={DOC_CHIP[type]}>{DOC_LBL[type]}</Chip>;}

function Spark({data,color='var(--accent)',h=140}){if(!data?.length)return null;const w=400,p=8;const mx=Math.max(...data),mn=Math.min(...data);const rg=mx-mn||1;const pts=data.map((v,i)=>[p+(i/(data.length-1))*(w-p*2),h-p-((v-mn)/rg)*(h-p*2)]);const path=pts.map((q,i)=>(i?'L':'M')+q[0].toFixed(1)+','+q[1].toFixed(1)).join(' ');const area=path+` L${w-p},${h-p} L${p},${h-p} Z`;return <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{width:'100%',height:h}}><defs><linearGradient id="sp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs><path d={area} fill="url(#sp)"/><path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/></svg>;}

function Toast({m,onDone}){React.useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);return <div className="toast"><ICk size={14}/>{m}</div>;}

      <div className="kpi"><div className="kpi-icon-wrap"><ICari size={14}/></div><div className="kpi-label">Aktif Cari</div><div className="kpi-val num">{active}<span className="suf">/{CUSTOMERS.length}</span></div><div className="kpi-delta">{passive} pasif cari</div></div>

          <tbody>
            {recent.length===0&&<tr><td colSpan={7} style={{padding:42,textAlign:'center',color:'var(--text-3)'}}>Henüz hareket yok.</td></tr>}
            {recent.map(t=>{const c=CUSTOMERS.find(x=>x.id===t.customerId);return <tr key={t.id} onClick={()=>onOpenCustomer(t.customerId)}>
              <td className="tdate">{fmtD(t.date)}</td>
              <td style={{fontWeight:500}}>{c?.name}</td>
              <td className="tref">{t.ref}</td>
              <td style={{color:'var(--text-2)'}}>{t.description}</td>
              <td><DocChip type={t.type}/></td>
              <td className="tnum">{t.borc?fmt(t.borc):<span className="muted">—</span>}</td>

    {(()=>{const riskli = CUSTOMERS.filter(c=>c.credit>0 && c.balance>c.credit*0.8).sort((a,b)=>(b.balance/b.credit)-(a.balance/a.credit));

// ============= CARI LIST =============
function CariList({onOpen,onNew}){
  const [sort,setSort]=React.useState('balance');
  const [stat,setStat]=React.useState('all');
  const [city,setCity]=React.useState('all');
  const [bal,setBal]=React.useState('all');
  const [ls,setLs]=React.useState('');
  const cities=[...new Set(CUSTOMERS.map(c=>c.city))].sort();
  const q=ls.toLowerCase().trim();
  let list=CUSTOMERS;
  if(q)list=list.filter(c=>(c.name+' '+c.code+' '+c.city).toLowerCase().includes(q));
  if(stat!=='all')list=list.filter(c=>c.status===stat);
  if(city!=='all')list=list.filter(c=>c.city===city);
  if(bal==='pos')list=list.filter(c=>c.balance>0);
  if(bal==='neg')list=list.filter(c=>c.balance<0);
  if(bal==='zero')list=list.filter(c=>c.balance===0);
  list=[...list].sort((a,b)=>sort==='balance'?b.balance-a.balance:sort==='city'?a.city.localeCompare(b.city):sort==='recent'?b.lastActivity.localeCompare(a.lastActivity):a.name.localeCompare(b.name));
  const totA=list.reduce((s,c)=>s+Math.max(0,c.balance),0);
  const totB=Math.abs(list.reduce((s,c)=>s+Math.min(0,c.balance),0));
  const overLim=list.filter(c=>c.balance>c.credit*0.8).length;
  return <div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:14}}>
      <div className="card" style={{padding:'13px 16px'}}><div className="kpi-label">Filtreli Cari</div><div className="num" style={{fontSize:22,fontWeight:600,marginTop:4,letterSpacing:'-0.02em'}}>{list.length}<span style={{fontSize:13,color:'var(--text-3)',fontWeight:500,marginLeft:4}}>/ {CUSTOMERS.length}</span></div></div>
      <div className="card" style={{padding:'13px 16px'}}><div className="kpi-label">Açık Alacak</div><div className="num" style={{fontSize:22,fontWeight:600,marginTop:4,color:'var(--accent)',letterSpacing:'-0.02em'}}>{fmt(totA)}</div></div>
      <div className="card" style={{padding:'13px 16px'}}><div className="kpi-label">Borçlu Bakiye</div><div className="num" style={{fontSize:22,fontWeight:600,marginTop:4,color:'var(--bad)',letterSpacing:'-0.02em'}}>{fmt(totB)}</div></div>
      <div className="card" style={{padding:'13px 16px'}}><div className="kpi-label">Limit Üstü Risk</div><div className="num" style={{fontSize:22,fontWeight:600,marginTop:4,color:overLim>0?'var(--warn)':'var(--text)',letterSpacing:'-0.02em'}}>{overLim}<span style={{fontSize:13,color:'var(--text-3)',fontWeight:500,marginLeft:4}}>cari</span></div></div>
    </div>
    <div className="fbar">
      <div className="seg">{[['name','İsim'],['balance','Bakiye'],['city','Şehir'],['recent','Son İşlem']].map(([k,l])=>(<button key={k} className={sort===k?'on':''} onClick={()=>setSort(k)}>{l}</button>))}</div>
      <div className={`flt ${stat!=='all'?'on':''}`}><IFlt size={13}/><select value={stat} onChange={e=>setStat(e.target.value)}><option value="all">Tüm Durumlar</option><option value="active">Aktif</option><option value="passive">Pasif</option></select><IDown size={12}/></div>
      <div className={`flt ${city!=='all'?'on':''}`}><IMap size={13}/><select value={city} onChange={e=>setCity(e.target.value)}><option value="all">Tüm Şehirler</option>{cities.map(c=><option key={c} value={c}>{c}</option>)}</select><IDown size={12}/></div>
      <div className={`flt ${bal!=='all'?'on':''}`}><IWal size={13}/><select value={bal} onChange={e=>setBal(e.target.value)}><option value="all">Tüm Bakiyeler</option><option value="pos">Alacaklı</option><option value="neg">Borçlu</option><option value="zero">Sıfır</option></select><IDown size={12}/></div>
      <div className="grow"/>
      <div className="input-search"><ISearch size={13}/><input placeholder="Cari ara…" value={ls} onChange={e=>setLs(e.target.value)}/></div>
      <button className="btn btn-sm" onClick={()=>openPdf('cari')} title="Cari Liste PDF Dökümü"><IPdf size={13}/>PDF</button>
      <button className="btn btn-sm" title="Excel Çıktısı"><IXls size={13}/>Excel</button>
      <button className="btn btn-sm btn-primary" onClick={onNew}><IPlus size={13}/>Yeni Cari</button>
    </div>
    <div className="card"><div className="tbl-wrap"><table className="tbl">
      <thead><tr>
        <th style={{width:90}}>Kod</th>
        <th>Firma Adı</th>
        <th className="r">Devir</th>
        <th className="r">Alış</th>
        <th className="r">Satış</th>
        <th className="r">Ödeme</th>
        <th className="r">Tahsilat</th>
        <th className="r">Bakiye</th>
        <th style={{width:1}}></th>
      </tr></thead>
      <tbody>
        {list.length===0&&<tr><td colSpan={9} style={{padding:42,textAlign:'center',color:'var(--text-3)'}}>Henüz cari yok.</td></tr>}
        {list.map(c=><tr key={c.id} onClick={()=>onOpen(c.id)}>
          <td className="mono" style={{color:'var(--text-3)'}}>{c.code}</td>
          <td style={{fontWeight:500}}>{c.name}</td>
          <td className="tnum">{fmt(c.devir||0)}</td>
          <td className="tnum">{fmt(c.alis||0)}</td>
          <td className="tnum">{fmt(c.satis||0)}</td>
          <td className="tnum">{fmt(c.odeme||0)}</td>
          <td className="tnum pos">{fmt(c.tahsilat||0)}</td>
          <td className="tnum" style={{fontWeight:600,color:(c.balance||0)<0?'var(--bad)':(c.balance||0)>0?'var(--good)':'var(--text)'}}>{fmt(c.balance||0)}</td>
          <td><IRight size={13} style={{color:'var(--text-3)'}}/></td>
        </tr>)}
      </tbody>
    </table></div></div>
  </div>;
}

function StokPage({onNew,onNewHrk,onOpenDetay}){
  const [tab,setTab]=React.useState('list');

  if(kat!=='all')items=items.filter(s=>s.kat===kat);
  if(stat==='low')items=items.filter(s=>s.stok<s.min);
  if(stat==='ok')items=items.filter(s=>s.stok>=s.min);

  const totalDeger=STOK.reduce((s,i)=>s+i.stok*i.alisFiyat,0);

        <div className={`flt ${stat!=='all'?'on':''}`}><IFlt size={13}/><select value={stat} onChange={e=>setStat(e.target.value)}><option value="all">Tüm Stoklar</option><option value="low">Kritik Seviye</option><option value="ok">Yeterli</option></select><IDown size={12}/></div>
        <div className="grow"/>
        <div className="input-search"><ISearch size={13}/><input placeholder="Stok ara…" value={ls} onChange={e=>setLs(e.target.value)}/></div>
        <button className="btn btn-sm" onClick={()=>openPdf('stok')} title="Stok Listesi PDF Dökümü"><IPdf size={13}/>PDF</button>
        <button className="btn btn-sm" title="Excel Çıktısı"><IXls size={13}/>Excel</button>
        <button className="btn btn-sm" onClick={onNewHrk}><IPlus size={13}/>Stok Hareketi</button>
        <button className="btn btn-sm btn-primary" onClick={onNew}><IPlus size={13}/>Yeni Stok</button>

            <td className="mono" style={{color:'var(--text-3)'}}>{s.kod}</td>
            <td style={{fontWeight:500}}>{s.ad}</td>
            <td><Chip k="mute" dot={false}>{s.kat}</Chip></td>

        <tbody>{STOK_HRK.slice(0,40).map(h=><tr key={h.id}>
          <td className="tdate">{fmtD(h.date)}</td>
          <td className="tref">{h.belge}</td>
          <td><div style={{fontWeight:500}}>{h.ad}</div><div className="mono" style={{fontSize:10.5,color:'var(--text-3)'}}>{h.kod}</div></td>
          <td>{h.tip==='giris'?<Chip k="good">Giriş</Chip>:<Chip k="info">Çıkış</Chip>}</td>
          <td style={{color:'var(--text-2)'}}>{h.cariName}</td>

          <td className="tnum" style={{fontWeight:600}}>{fmt(h.tutar)}</td>
        </tr>)}</tbody>
      </table></div></div>
    </>}
  </div>;
}

function StokDetay({urunKod,onBack}){
  const s = STOK.find(x=>x.kod===urunKod);
  const [tab,setTab] = React.useState('hrk');
  if(!s) return <div className="card" style={{padding:48,textAlign:'center'}}>
    <div style={{fontSize:18,fontWeight:600,marginBottom:6}}>Ürün bulunamadı</div>
    <div style={{marginTop:18}}><button className="btn" onClick={onBack}>← Stok</button></div>
  </div>;
  const hareketler = STOK_HRK.filter(h=>h.kod===urunKod).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const uretimHrk = (URETIM||[]).flatMap(u=>{
    const out=[];
    (u.girdiler||[]).filter(g=>g.urun_kod===urunKod).forEach(g=>out.push({...g,tarih:u.tarih,tip:'GIRDI'}));
    (u.ciktilar||[]).filter(c=>c.urun_kod===urunKod).forEach(c=>out.push({...c,tarih:u.tarih,tip:'CIKTI'}));

    <div className="hstack" style={{marginBottom:14,gap:8}}>

const KDV_OPTIONS = [{v:0,l:'%0'},{v:1,l:'%1'},{v:10,l:'%10'},{v:20,l:'%20'}];
const TEVKIFAT_OPTIONS = [{v:'0',l:'Yok'},{v:'2/10',l:'2/10'},{v:'5/10',l:'5/10'},{v:'7/10',l:'7/10'},{v:'9/10',l:'9/10'}];

function hesaplaHareket(miktar, birimFiyat, kdvOrani, tevkifatStr) {
  const m = parseFloat(miktar)||0, bf = parseFloat(birimFiyat)||0;
  const ko = parseFloat(kdvOrani)||0;
  const matrah = m * bf;
  const kdv = matrah * ko / 100;
  let tevkifatPay = 0;
  if (tevkifatStr && tevkifatStr !== '0') {
    const parts = String(tevkifatStr).split('/');
    if (parts.length === 2) tevkifatPay = parseInt(parts[0])||0;
  }
  const tevkifatTutar = kdv * tevkifatPay / 10;
  const odenecekKdv = kdv - tevkifatTutar;
  const kdvliToplam = matrah + odenecekKdv;
  return { matrah, kdv, tevkifatTutar, odenecekKdv, kdvliToplam };
}

// ISO hafta hesabı için yardımcı
function getISOWeeks(yil, ay) {
  const result = [];
  const seen = new Set();
  const lastDay = new Date(yil, ay, 0).getDate();
  for (let g = 1; g <= lastDay; g++) {
    const d = new Date(yil, ay-1, g);
    // ISO hafta numarası
    const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    tmp.setUTCDate(tmp.getUTCDate() + 4 - (tmp.getUTCDay()||7));
    const ys = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
    const isoYil = tmp.getUTCFullYear();
    const isoHafta = Math.ceil((((tmp - ys)/86400000) + 1)/7);
    const key = `${isoYil}:${isoHafta}`;
    if (seen.has(key)) continue;
    seen.add(key);
    // Pazartesi-Pazar aralığı
    const wd = d.getDay()||7;
    const pazartesi = new Date(d); pazartesi.setDate(d.getDate() - (wd-1));
    const pazar = new Date(pazartesi); pazar.setDate(pazartesi.getDate()+6);
    const ayKisa = ['','Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
    const tarihStr = pazartesi.getMonth()===pazar.getMonth()
      ? `${pazartesi.getDate()}-${pazar.getDate()} ${ayKisa[pazartesi.getMonth()+1]}`
      : `${pazartesi.getDate()} ${ayKisa[pazartesi.getMonth()+1]} - ${pazar.getDate()} ${ayKisa[pazar.getMonth()+1]}`;
    result.push({ isoYil, hafta: isoHafta, key, label: `${isoHafta}. Hafta (${tarihStr})` });
  }
  return result;
}

let DESI_URUNLER = [];
// TODO Faz 2/3: const r = await fetch('/api/bilanco/desi-urunler'); DESI_URUNLER = await r.json();

function HaftalikBilanco(){
  const now = new Date();
  const [yil,setYil] = React.useState(now.getFullYear());
  const [ay,setAy] = React.useState(now.getMonth()+1);
  const haftalar = React.useMemo(()=>getISOWeeks(yil,ay),[yil,ay]);
  const [haftaKey,setHaftaKey] = React.useState(haftalar[0]?.key||'');
  React.useEffect(()=>{ if(!haftalar.find(h=>h.key===haftaKey)) setHaftaKey(haftalar[0]?.key||''); },[haftalar,haftaKey]);

  const [papelFiyat,setPapelFiyat] = React.useState(25);
  const [tutkalFiyat,setTutkalFiyat] = React.useState(10);

  // Her ürün için satır state'i: { [kod]: {adet, tutkal, satisFiyat} }
  const [rowState,setRowState] = React.useState({});
  React.useEffect(()=>{
    // DESI_URUNLER değişirse veya seçili hafta değişirse: state'i sıfırla
    const fresh = {};
    DESI_URUNLER.forEach(u=>{ fresh[u.kod] = { adet:0, tutkal: tutkalFiyat, satisFiyat: 0 }; });
    setRowState(fresh);
    // Faz 2/3: const r = await fetch(`/api/bilanco/${isoYil}/${isoHafta}`); ... seedRowState(r.kalemler)
  },[haftaKey]);

  const updRow = (kod, k, v) => setRowState(p=>({...p, [kod]: {...(p[kod]||{adet:0,tutkal:tutkalFiyat,satisFiyat:0}), [k]: parseFloat(v)||0}}));

  // Hesaplamalar
  const calcRow = (u) => {
    const r = rowState[u.kod] || { adet:0, tutkal:tutkalFiyat, satisFiyat:0 };
    const desi = parseFloat(u.desi)||0;
    const papelHam = desi * papelFiyat;
    const hamMaliyet = papelHam + r.tutkal;
    const kar = r.satisFiyat>0 ? r.satisFiyat - hamMaliyet : 0;
    const kazanc = kar * r.adet;
    const hammadde = desi * r.adet;
    const ciro = r.satisFiyat * r.adet;
    return { ...r, desi, papelHam, hamMaliyet, kar, kazanc, hammadde, ciro };
  };

  const allRows = DESI_URUNLER.map(u=>({u, c: calcRow(u)}));
  const tHammadde = allRows.reduce((s,x)=>s+x.c.hammadde,0);
  const tCiro = allRows.reduce((s,x)=>s+x.c.ciro,0);
  const tKazanc = allRows.reduce((s,x)=>s+x.c.kazanc,0);

  const yillar = [];
  const cy = now.getFullYear();
  for(let i=cy-2;i<=cy+1;i++) yillar.push(i);
  const AY_ISIMLERI = {1:'Ocak',2:'Şubat',3:'Mart',4:'Nisan',5:'Mayıs',6:'Haziran',7:'Temmuz',8:'Ağustos',9:'Eylül',10:'Ekim',11:'Kasım',12:'Aralık'};

  const onSave = ()=>{ window.__toast?.('Bilanço kaydedildi'); };
  const onPdf = ()=>openPdf('bilanco',{yil,hafta:haftaKey});
  const onExcel = ()=>{ window.__toast?.('Excel hazırlanıyor…'); };

  return <div>
    {/* Üst dönem seçici */}
    <div className="card" style={{marginBottom:14}}>
      <div className="card-hd"><div><div className="card-ttl">Dönem Seçimi</div><div className="card-sub">Yıl · Ay · Hafta</div></div></div>
      <div style={{padding:'14px 18px',display:'flex',gap:12,alignItems:'flex-end',flexWrap:'wrap'}}>
        <div className="field" style={{margin:0,minWidth:120}}><label>Yıl</label><select value={yil} onChange={e=>setYil(parseInt(e.target.value))}>{yillar.map(y=><option key={y} value={y}>{y}</option>)}</select></div>
        <div className="field" style={{margin:0,minWidth:140}}><label>Ay</label><select value={ay} onChange={e=>setAy(parseInt(e.target.value))}>{Object.keys(AY_ISIMLERI).map(m=><option key={m} value={m}>{AY_ISIMLERI[m]}</option>)}</select></div>
        <div className="field" style={{margin:0,flex:1,minWidth:240}}><label>Hafta</label><select value={haftaKey} onChange={e=>setHaftaKey(e.target.value)}>{haftalar.map(h=><option key={h.key} value={h.key}>{h.label}</option>)}{haftalar.length===0&&<option value="">— Hafta yok —</option>}</select></div>
      </div>
    </div>

    {/* Hammadde fiyat girişi (warn-soft sarı) */}
    <div className="card" style={{marginBottom:14,background:'var(--warn-soft)',borderColor:'rgba(251,191,36,0.3)'}}>
      <div style={{padding:'14px 18px',display:'flex',gap:14,alignItems:'flex-end',flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:8,background:'var(--warn)',color:'#0a0a0b',display:'grid',placeItems:'center'}}><ITag size={16}/></div>
          <div><div style={{fontSize:13,fontWeight:600,color:'var(--warn)'}}>Hammadde Fiyatları</div><div style={{fontSize:11,color:'var(--text-2)'}}>Bu hafta için geçerli</div></div>
        </div>
        <div className="grow"/>
        <div className="field" style={{margin:0,minWidth:180}}><label>Papel Fiyat (₺/desi)</label><input type="number" step="0.01" value={papelFiyat} onChange={e=>setPapelFiyat(parseFloat(e.target.value)||0)} style={{textAlign:'right',fontVariantNumeric:'tabular-nums'}}/></div>
        <div className="field" style={{margin:0,minWidth:180}}><label>Tutkal Fiyat (₺/birim)</label><input type="number" step="0.01" value={tutkalFiyat} onChange={e=>setTutkalFiyat(parseFloat(e.target.value)||0)} style={{textAlign:'right',fontVariantNumeric:'tabular-nums'}}/></div>
      </div>
    </div>

    {/* Tablo */}
    <div className="card" style={{marginBottom:14}}>
      <div className="card-hd"><div className="card-ttl">DESİ Üretim Tablosu</div><span className="muted" style={{fontSize:11.5}}>{DESI_URUNLER.length} ürün</span><div className="grow"/></div>
      <div className="tbl-wrap">
        <table className="tbl">

          </tr></thead>
          <tbody>
            {allRows.length===0&&<tr><td colSpan={11} style={{padding:42,textAlign:'center',color:'var(--text-3)'}}>DESİ değerli ürün yok. <strong>Stok</strong> sayfasından ürünlere DESİ değeri gir.</td></tr>}
            {allRows.map(({u,c})=><tr key={u.kod}>

              <td className="tnum" style={{color:'var(--text-2)'}}>{fmt(c.papelHam)}</td>
              <td style={{padding:'4px 6px'}}><input type="number" value={c.tutkal||''} onChange={e=>updRow(u.kod,'tutkal',e.target.value)} placeholder="0" style={{width:'100%',padding:'5px 8px',border:'1px solid var(--border)',borderRadius:5,background:'var(--panel-2)',textAlign:'right',fontSize:12.5,fontVariantNumeric:'tabular-nums',color:'var(--text)'}}/></td>
              <td className="tnum">{fmt(c.hamMaliyet)}</td>

              <td className="tnum" style={{color:c.kar>=0?'var(--good)':'var(--bad)',fontWeight:600}}>{fmt(c.kar)}</td>
              <td className="tnum" style={{color:'var(--info)',fontWeight:600}}>{fmt(c.kazanc)}</td>

    {/* Toplam özet (info-soft mavi) */}

      <div style={{padding:'18px 20px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:24}}>

    <div className="hstack" style={{justifyContent:'flex-end',gap:8}}>

// ============= KASA MODAL =============
function KasaModal({onClose,onSaved}){
  const [tarih,setTarih]=React.useState(new Date().toISOString().slice(0,10));
  const [tip,setTip]=React.useState('GELIR');
  const [firmaId,setFirmaId]=React.useState(CUSTOMERS[0]?.id||'');
  const [tutar,setTutar]=React.useState('');
  const [odeme,setOdeme]=React.useState('Nakit');
  const [aciklama,setAciklama]=React.useState('');
  // Çek alanları
  const [cekTuru,setCekTuru]=React.useState('FIRMA'); // FIRMA / CIRO
  const [cekNo,setCekNo]=React.useState('');
  const [cekVade,setCekVade]=React.useState('');
  const [ciroSecili,setCiroSecili]=React.useState(''); // portföydeki çek

  const portfoy = CEKLER.filter(c=>c.tip==='ALINAN' && c.durum==='portfoyde');
  React.useEffect(()=>{
    if(odeme==='Çek' && cekTuru==='CIRO' && ciroSecili){
      const c=portfoy.find(x=>x.id===ciroSecili);
      if(c) setTutar(String(c.tutar||''));
    }
  },[ciroSecili,cekTuru,odeme]);

  const submit=async(e)=>{
    e.preventDefault();
    if(!tutar){ alert('Tutar zorunlu'); return; }
    const c = CUSTOMERS.find(x=>x.id===firmaId);
    const payload = {
      tarih, tur: tip,
      firma_kod: c?.code||'', firma_ad: c?.name||'',
      tutar: parseFloat(tutar),
      odeme_sekli: odeme, aciklama,
    };
    if(odeme==='Çek'){
      payload.cek_turu = cekTuru;
      payload.cek_no = cekNo;
      payload.cek_vade_tarih = cekVade;
      payload.ciro_cek_id = ciroSecili;
    }
    const res = await apiPost('/api/kasa', payload);
    if(res?.ok) onSaved?.(tip==='GELIR'?'Kasa girişi kaydedildi':'Kasa çıkışı kaydedildi');
    else alert('Kayıt başarısız');
  };

  return <div className="scrim" onClick={onClose}>
    <form className="modal" style={{width:600}} onClick={e=>e.stopPropagation()} onSubmit={submit}>
      <div className="m-hd">
        <div style={{width:34,height:34,borderRadius:8,background:tip==='GELIR'?'var(--good-soft)':'var(--bad-soft)',color:tip==='GELIR'?'var(--good)':'var(--bad)',display:'grid',placeItems:'center'}}><IKasa size={15}/></div>
        <div style={{flex:1}}><div className="m-ttl">Yeni Kasa Kaydı</div><div className="m-sub">{tip==='GELIR'?'Para girişi':'Para çıkışı'}</div></div>
        <button type="button" className="btn btn-icon btn-ghost" onClick={onClose}><IX size={14}/></button>
      </div>
      <div className="m-bd">
        <div className="field"><label>Tip</label><div className="tp">
          <label><input type="radio" name="kt" checked={tip==='GELIR'} onChange={()=>setTip('GELIR')}/><div className="tp-ic"><IUp size={14}/></div><div><div className="tp-ttl">Giriş</div><div className="tp-sub">Kasaya para giriyor</div></div></label>
          <label><input type="radio" name="kt" checked={tip==='GIDER'} onChange={()=>setTip('GIDER')}/><div className="tp-ic"><IDn size={14}/></div><div><div className="tp-ttl">Çıkış</div><div className="tp-sub">Kasadan para çıkıyor</div></div></label>
        </div></div>
        <div className="field-row">
          <div className="field"><label>Tarih</label><input type="date" value={tarih} onChange={e=>setTarih(e.target.value)}/></div>
          <div className="field"><label>Firma</label><select value={firmaId} onChange={e=>setFirmaId(e.target.value)}>{CUSTOMERS.length===0&&<option value="">— Henüz cari yok —</option>}{CUSTOMERS.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
        </div>
        <div className="field-row">
          <div className="field"><label>Tutar (₺)</label><input value={tutar} onChange={e=>setTutar(e.target.value)} placeholder="0,00" style={{textAlign:'right',fontSize:16,fontWeight:600,fontVariantNumeric:'tabular-nums'}} autoFocus disabled={odeme==='Çek'&&cekTuru==='CIRO'&&!!ciroSecili}/></div>
          <div className="field"><label>Ödeme Şekli</label><select value={odeme} onChange={e=>setOdeme(e.target.value)}>{ODEME_SEKLI.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
        </div>
        {/* Koşullu Çek alanları */}

// ============= ÇEK TAKVİMİ PAGE =============
function CekTakvim(){
  const today = new Date(); today.setHours(0,0,0,0);
  const [ls,setLs]=React.useState('');
  const q=ls.toLowerCase().trim();
  const portfoy = CEKLER.filter(c=>c.durum==='portfoyde');
  const filt = portfoy.filter(c=>q?(c.evrak_no+' '+c.firma_ad).toLowerCase().includes(q):true)
    .sort((a,b)=>(a.vade_tarihi||'').localeCompare(b.vade_tarihi||''));
  const gunFark=(d)=>{if(!d)return null;const x=new Date(d);x.setHours(0,0,0,0);return Math.round((x-today)/86400000);};
  const gecmis = filt.filter(c=>{const g=gunFark(c.vade_tarihi);return g!==null && g<0;}).length;
  const bugun = filt.filter(c=>gunFark(c.vade_tarihi)===0).length;
  const uc = filt.filter(c=>{const g=gunFark(c.vade_tarihi);return g>0 && g<=3;}).length;
  const yedi = filt.filter(c=>{const g=gunFark(c.vade_tarihi);return g>3 && g<=7;}).length;

  return <div>
    <div className="kpi-grid">
      <div className="kpi" style={{borderColor:gecmis>0?'var(--bad)':undefined}}><div className="kpi-icon-wrap" style={{color:'var(--bad)'}}><IBell size={14}/></div><div className="kpi-label">Vadesi Geçmiş</div><div className="kpi-val num" style={{color:'var(--bad)'}}>{gecmis}</div><div className="kpi-delta">Acil</div></div>
      <div className="kpi" style={{borderColor:bugun>0?'var(--warn)':undefined}}><div className="kpi-icon-wrap" style={{color:'var(--warn)'}}><ICal size={14}/></div><div className="kpi-label">Bugün Vadeli</div><div className="kpi-val num" style={{color:'var(--warn)'}}>{bugun}</div><div className="kpi-delta">Bugün</div></div>

      <div className="kpi"><div className="kpi-icon-wrap" style={{color:'var(--info)'}}><ICal size={14}/></div><div className="kpi-label">7 Gün İçinde</div><div className="kpi-val num" style={{color:'var(--info)'}}>{yedi}</div><div className="kpi-delta">Hafta</div></div>

      <div className="grow"/>

        <thead><tr><th>Çek No</th><th>Firma</th><th>Vade</th><th className="r">Kalan Gün</th><th className="r">Tutar</th><th>Durum</th></tr></thead>
        <tbody>
          {filt.length===0&&<tr><td colSpan={6} style={{padding:42,textAlign:'center',color:'var(--text-3)'}}>Portföyde çek yok.</td></tr>}
          {filt.map(c=>{const g=gunFark(c.vade_tarihi);const k=g===null?'mute':g<0?'bad':g===0?'warn':g<=3?'warn':g<=7?'info':'good';return <tr key={c.id}>
            <td className="tref">{c.evrak_no}</td>
            <td style={{fontWeight:500}}>{c.firma_ad}</td>
            <td className="tdate">{fmtD(c.vade_tarihi)}</td>

            <td className="tnum">{fmt(c.tutar||0)}</td>
            <td><Chip k={k}>{g===null?'?':g<0?'Geçmiş':g===0?'Bugün':g<=3?'Yakın':g<=7?'Hafta':'Açık'}</Chip></td>
          </tr>;})}
        </tbody>
      </table></div>
    </div>
  </div>;
}

// ============= MUTABAKAT PAGE =============
function MutabakatPage({onSaved}){
  const [firmaId,setFirmaId]=React.useState(CUSTOMERS[0]?.id||'');
  const [tarih,setTarih]=React.useState(new Date().toISOString().slice(0,10));
  const [firmaBeyan,setFirmaBeyan]=React.useState('');
  const [not,setNot]=React.useState('');
  const c = CUSTOMERS.find(x=>x.id===firmaId);
  const sistemBakiye = c?.balance||0;
  const fb = parseFloat(firmaBeyan)||0;
  const fark = sistemBakiye - fb;
  const tam = Math.abs(fark)<0.01;

  const tamSayi = MUTABAKATLAR.filter(m=>m.durum==='TAM').length;
  const farkSayi = MUTABAKATLAR.filter(m=>m.durum==='FARKLI').length;

  const submit=async(e)=>{
    e.preventDefault();
    if(!firmaId||!firmaBeyan){ alert('Firma ve beyan tutarı zorunlu'); return; }
    const payload = {
      tarih, firma_kod: c?.code||'', firma_ad: c?.name||'',
      sistem_bakiye: sistemBakiye,
      firma_beyan: parseFloat(firmaBeyan||0),
      fark, durum: tam?'TAM':'FARKLI', not,
    };
    const res = await apiPost('/api/mutabakat', payload);
    if(res?.ok){ window.__toast?.('Mutabakat kaydedildi'); setFirmaBeyan(''); setNot(''); window.__reload?.(); }
    else alert('Kayıt başarısız');
  };

  return <div>
    <div className="kpi-grid">
      <div className="kpi"><div className="kpi-icon-wrap"><ICk size={14}/></div><div className="kpi-label">Toplam Mutabakat</div><div className="kpi-val num">{MUTABAKATLAR.length}</div><div className="kpi-delta">Tüm zamanlar</div></div>
      <div className="kpi"><div className="kpi-icon-wrap" style={{color:'var(--good)'}}><ICk size={14}/></div><div className="kpi-label">Tam Eşleşme</div><div className="kpi-val num" style={{color:'var(--good)'}}>{tamSayi}</div><div className="kpi-delta">Sorunsuz</div></div>
      <div className="kpi"><div className="kpi-icon-wrap" style={{color:'var(--bad)'}}><IBell size={14}/></div><div className="kpi-label">Farklı Kayıt</div><div className="kpi-val num" style={{color:'var(--bad)'}}>{farkSayi}</div><div className="kpi-delta">İncelenmeli</div></div>
    </div>

    <div className="card" style={{marginBottom:14}}>
      <div className="card-hd"><div><div className="card-ttl">Yeni Mutabakat</div><div className="card-sub">Sistem ve firma beyan bakiyesini karşılaştır</div></div></div>
      <form onSubmit={submit} style={{padding:'18px 20px'}}>
        <div className="field-row">
          <div className="field"><label>Firma</label><select value={firmaId} onChange={e=>setFirmaId(e.target.value)}>{CUSTOMERS.length===0&&<option value="">— Cari yok —</option>}{CUSTOMERS.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <div className="field"><label>Mutabakat Tarihi</label><input type="date" value={tarih} onChange={e=>setTarih(e.target.value)}/></div>
        </div>
        <div className="field-row">
          <div className="field"><label>Sistem Bakiyesi (otomatik)</label><input value={fmt(sistemBakiye)} disabled style={{textAlign:'right',fontVariantNumeric:'tabular-nums',color:'var(--text-2)'}}/></div>
          <div className="field"><label>Firma Beyan Bakiyesi (₺)</label><input value={firmaBeyan} onChange={e=>setFirmaBeyan(e.target.value)} placeholder="0,00" style={{textAlign:'right',fontVariantNumeric:'tabular-nums',fontSize:16,fontWeight:600}}/></div>
        </div>
        {firmaBeyan&&<div style={{padding:'12px 16px',background:tam?'var(--good-soft)':'var(--bad-soft)',border:`1px solid ${tam?'rgba(74,222,128,0.3)':'rgba(248,113,113,0.3)'}`,borderRadius:8,marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
          {tam?<ICk size={20} style={{color:'var(--good)'}}/>:<IBell size={20} style={{color:'var(--bad)'}}/>}
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:13,color:tam?'var(--good)':'var(--bad)'}}>{tam?'Tam Eşleşme':'Fark Var'}</div>
            <div style={{fontSize:12,color:'var(--text-2)',marginTop:2}}>Fark: <span className="num" style={{fontWeight:600}}>{fmt(fark)}</span></div>
          </div>
        </div>}
        <div className="field"><label>Not</label><textarea rows="2" value={not} onChange={e=>setNot(e.target.value)} placeholder="İsteğe bağlı açıklama"/></div>
        <div className="hstack" style={{justifyContent:'flex-end'}}><button type="submit" className="btn btn-primary"><ICk size={13}/>Mutabakat Kaydet</button></div>
      </form>
    </div>

    <div className="card">
      <div className="card-hd"><div className="card-ttl">Mutabakat Geçmişi</div><span className="muted" style={{fontSize:11.5}}>{MUTABAKATLAR.length} kayıt</span></div>
      <div className="tbl-wrap"><table className="tbl">
        <thead><tr><th>Tarih</th><th>Firma</th><th className="r">Sistem</th><th className="r">Firma Beyan</th><th className="r">Fark</th><th>Durum</th><th>Not</th></tr></thead>
        <tbody>
          {MUTABAKATLAR.length===0&&<tr><td colSpan={7} style={{padding:42,textAlign:'center',color:'var(--text-3)'}}>Henüz mutabakat kaydı yok.</td></tr>}
          {MUTABAKATLAR.map(m=><tr key={m.id||m.tarih+m.firma_kod}>
            <td className="tdate">{fmtD(m.tarih)}</td>
            <td style={{fontWeight:500}}>{m.firma_ad}</td>
            <td className="tnum">{fmt(m.sistem_bakiye||0)}</td>
            <td className="tnum">{fmt(m.firma_beyan||0)}</td>
            <td className="tnum" style={{fontWeight:600,color:Math.abs(m.fark||0)<0.01?'var(--good)':'var(--bad)'}}>{fmt(m.fark||0)}</td>
            <td><Chip k={m.durum==='TAM'?'good':'bad'}>{m.durum}</Chip></td>
            <td style={{color:'var(--text-2)',fontSize:12}}>{m.not}</td>
          </tr>)}
        </tbody>
      </table></div>
    </div>
  </div>;
}

          {list.length===0&&<tr><td colSpan={6} style={{padding:42,textAlign:'center',color:'var(--text-3)'}}>Henüz üretim kaydı yok. <strong style={{color:'var(--accent)',cursor:'pointer'}} onClick={onNew}>Yeni Üretim</strong> ile başla.</td></tr>}

// ============= ÜRETIM MODAL (yeni / düzenle) =============
function UretimModal({onClose,onSaved}){
  const [tarih,setTarih]=React.useState(new Date().toISOString().slice(0,10));
  const [aciklama,setAciklama]=React.useState('');
  const [girdiler,setGirdiler]=React.useState([{urun_kod:STOK[0]?.kod||'',miktar:''}]);
  const [ciktilar,setCiktilar]=React.useState([{urun_kod:STOK[0]?.kod||'',miktar:''}]);
  const tGirdi = girdiler.reduce((s,g)=>s+(parseFloat(g.miktar)||0),0);
  const tCikti = ciktilar.reduce((s,c)=>s+(parseFloat(c.miktar)||0),0);
  const fire = tGirdi - tCikti;
  const submit=(e)=>{e.preventDefault();onSaved?.('Üretim kaydedildi');};
  const updGirdi=(i,k,v)=>setGirdiler(p=>p.map((g,j)=>j===i?{...g,[k]:v}:g));
  const updCikti=(i,k,v)=>setCiktilar(p=>p.map((c,j)=>j===i?{...c,[k]:v}:c));

  return <div className="scrim" onClick={onClose}>
    <form className="modal" style={{width:720}} onClick={e=>e.stopPropagation()} onSubmit={submit}>
      <div className="m-hd">
        <div style={{width:34,height:34,borderRadius:8,background:'var(--accent-soft)',color:'var(--accent)',display:'grid',placeItems:'center'}}><IFct size={15}/></div>
        <div style={{flex:1}}><div className="m-ttl">Yeni Üretim Kaydı</div><div className="m-sub">Hammadde girdi-çıktı</div></div>
        <button type="button" className="btn btn-icon btn-ghost" onClick={onClose}><IX size={14}/></button>
      </div>
      <div className="m-bd">
        <div className="field-row">
          <div className="field"><label>Tarih</label><input type="date" value={tarih} onChange={e=>setTarih(e.target.value)}/></div>
          <div className="field"><label>Açıklama</label><input value={aciklama} onChange={e=>setAciklama(e.target.value)} placeholder="Üretim partisi / not"/></div>
        </div>
        {/* Girdiler */}
        <div style={{marginBottom:14}}>
          <div className="hstack" style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--info)'}}>Girdiler (Hammadde)</div><div className="grow"/><button type="button" className="btn btn-sm btn-ghost" onClick={()=>setGirdiler(p=>[...p,{urun_kod:STOK[0]?.kod||'',miktar:''}])}><IPlus size={12}/>Satır Ekle</button></div>
          {girdiler.map((g,i)=><div key={i} className="hstack" style={{gap:8,marginBottom:6}}>
            <select value={g.urun_kod} onChange={e=>updGirdi(i,'urun_kod',e.target.value)} style={{flex:1,padding:'7px 10px',border:'1px solid var(--border)',borderRadius:6,background:'var(--panel-2)',color:'var(--text)'}}>{STOK.length===0&&<option value="">— Ürün yok —</option>}{STOK.map(s=><option key={s.kod} value={s.kod}>{s.kod} · {s.ad}</option>)}</select>
            <input value={g.miktar} onChange={e=>updGirdi(i,'miktar',e.target.value)} placeholder="0,00 kg" style={{width:120,padding:'7px 10px',border:'1px solid var(--border)',borderRadius:6,background:'var(--panel-2)',textAlign:'right',color:'var(--text)'}}/>
            <button type="button" className="btn btn-icon btn-ghost btn-sm" style={{color:'var(--bad)'}} onClick={()=>setGirdiler(p=>p.filter((_,j)=>j!==i))}><IX size={13}/></button>
          </div>)}
        </div>
        {/* Çıktılar */}
        <div style={{marginBottom:14}}>
          <div className="hstack" style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--good)'}}>Çıktılar (Üretilen)</div><div className="grow"/><button type="button" className="btn btn-sm btn-ghost" onClick={()=>setCiktilar(p=>[...p,{urun_kod:STOK[0]?.kod||'',miktar:''}])}><IPlus size={12}/>Satır Ekle</button></div>
          {ciktilar.map((c,i)=><div key={i} className="hstack" style={{gap:8,marginBottom:6}}>
            <select value={c.urun_kod} onChange={e=>updCikti(i,'urun_kod',e.target.value)} style={{flex:1,padding:'7px 10px',border:'1px solid var(--border)',borderRadius:6,background:'var(--panel-2)',color:'var(--text)'}}>{STOK.length===0&&<option value="">— Ürün yok —</option>}{STOK.map(s=><option key={s.kod} value={s.kod}>{s.kod} · {s.ad}</option>)}</select>
            <input value={c.miktar} onChange={e=>updCikti(i,'miktar',e.target.value)} placeholder="0,00 kg" style={{width:120,padding:'7px 10px',border:'1px solid var(--border)',borderRadius:6,background:'var(--panel-2)',textAlign:'right',color:'var(--text)'}}/>
            <button type="button" className="btn btn-icon btn-ghost btn-sm" style={{color:'var(--bad)'}} onClick={()=>setCiktilar(p=>p.filter((_,j)=>j!==i))}><IX size={13}/></button>
          </div>)}
        </div>
        {/* Özet */}
        <div style={{padding:'12px 14px',background:'var(--panel-2)',border:'1px solid var(--border)',borderRadius:8,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
          <div><div style={{fontSize:10.5,color:'var(--text-3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em'}}>Toplam Girdi</div><div className="num" style={{fontSize:16,fontWeight:700,color:'var(--info)'}}>{tGirdi.toFixed(1)} kg</div></div>
          <div><div style={{fontSize:10.5,color:'var(--text-3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em'}}>Toplam Çıktı</div><div className="num" style={{fontSize:16,fontWeight:700,color:'var(--good)'}}>{tCikti.toFixed(1)} kg</div></div>

// ============= APP =============
function App(){
  const [page,setPage]=React.useState(()=>localStorage.getItem('page_v3')||'dashboard');
  const [focus,setFocus]=React.useState(null);
  const [modal,setModal]=React.useState(null);
  const [toast,setToast]=React.useState(null);
  const [tweaks,setTweaks]=React.useState(false);
  const [theme,setTheme]=React.useState(()=>{try{return JSON.parse(document.getElementById('tweak-defaults').textContent.match(/\{.*\}/s)[0]).theme||'dark';}catch{return 'dark';}});
  const [dataVersion,setDataVersion]=React.useState(0);
  const [loading,setLoading]=React.useState(true);
  const [me,setMe]=React.useState(null);
  React.useEffect(()=>{localStorage.setItem('page_v3',page);},[page]);
  React.useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);

  // === DATA LOAD ===
  const reloadData = React.useCallback(async () => {
    setLoading(true);
    try {
      const meRes = await fetch('/api/me', { credentials: 'same-origin' });
      if (meRes.status === 401) { window.location.href = '/login'; return; }
      if (meRes.ok) setMe(await meRes.json());
      const [c, h, s, k, gg, p, ck, mut, to, kr, lg, fmaster, kasa_bak, dashKpi, settings, ckPort, ckVade, gg_ozet] = await Promise.all([
        apiGet('/api/cariler'),
        apiGet('/api/hareketler'),
        apiGet('/api/stok'),
        apiGet('/api/kasa'),
        apiGet('/api/gelir-gider'),
        apiGet('/api/personel'),
        apiGet('/api/cekler'),
        apiGet('/api/mutabakat'),
        apiGet('/api/tahsilat-onerileri'),
        apiGet('/api/karlilik'),
        apiGet('/api/logs'),
        apiGet('/api/cariler/master'),
        apiGet('/api/kasa/bakiye'),
        apiGet('/api/dashboard/kpi'),
        apiGet('/api/settings'),
        apiGet('/api/cekler/portfoyde'),
        apiGet('/api/cekler/vade-uyarilari'),
        apiGet('/api/gelir-gider/ozet'),
      ]);
      // Cariler: bakiye listesi + master birleştir
      const masterMap = {};
      (fmaster || []).forEach(f => { masterMap[f.kod] = f; });
      CUSTOMERS = (c || []).map(row => {
        const m = masterMap[row.kod] || {};
        return adapt.cari({ ...m, ...row });
      });
      // Diğer entity'ler
      TX = (h || []).map(adapt.tx);
      HAREKETLER = (h || []).map(adapt.hareket);
      STOK = (s || []).map(adapt.stok);
      // STOK_HRK boş - stok detay sayfasında ürün bazında çekilir
      KASA = (k || []).map(adapt.kasa);
      GG = (gg || []).map(adapt.gg);
      PERSONEL = (p || []).map(adapt.personel);
      CEKLER = (ck || []).map(adapt.cek);
      MUTABAKATLAR = (mut || []).map(adapt.mutabakat);
      TAHSILAT_ONERI = (to || []).map(adapt.oneri);
      KARLILIK = (kr || []).map(adapt.karlilik);
      LOGS = (lg || []).map(adapt.log);
      FIRMALAR_MASTER = (fmaster || []).map(f => ({
        kod: f.kod, ad: f.ad, vkn: f.vkn_tckn || '',
        telefon: f.tel || '', email: f.email || '',
        adres: f.adres || '', nace: f.nace || '',
        is_alani: f.is_alani || '',
        risk_limiti: parseFloat(f.risk_limiti || 0),
      }));
      if (settings) SETTINGS = { ...SETTINGS, ...settings };
      // DESI_URUNLER: STOK içinden filtrele
      DESI_URUNLER = STOK.filter(s => s.desi > 0).map(s => ({ kod: s.kod, ad: s.ad, desi: s.desi }));
      setDataVersion(v => v + 1);
    } catch (e) {
      console.error('reloadData error', e);
    } finally {
      setLoading(false);
    }
  }, []);

  React.useEffect(() => { reloadData(); }, [reloadData]);
  // Modal save sonrası reload tetikle
  window.__reload = reloadData;
  window.__nav=(p,foc)=>{setPage(p);if(foc!==undefined)setFocus(foc);};
  React.useEffect(()=>{
    const on=(e)=>{const d=e.data||{};if(d.type==='__activate_edit_mode')setTweaks(true);if(d.type==='__deactivate_edit_mode')setTweaks(false);};
    window.addEventListener('message',on);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',on);
  },[]);
  const setKey=(k,v)=>{if(k==='theme')setTheme(v);window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*');};
  const nav=(p,foc=null)=>{
    setPage(p);setFocus(foc);
  };
  const openCustomer=(id)=>{setFocus(id);setPage('cari');};
  const openEkstre=(id)=>{setFocus(id);setPage('ekstre');};
  const openStokDetay=(kod)=>{setFocus(kod);setPage('stokDetay');};
  const openModal=(k,id)=>setModal({kind:k,customerId:id});
  // Toast'a global erişim (HaftalikBilanco gibi sayfalardan)
  window.__toast = (m) => setToast(m);

  const meta={
    dashboard:['Bilgi Ekranı'],
    cariler:['Cariler'],cari:['Cariler','Cari Kart Detayı'],ekstre:['Cariler','Hesap Ekstresi'],
    hareketler:['Stok Hareketler'],
    firmalar:['Firmalar (Master)'],
    stok:['Stok'],
    kasa:['Kasa'],
    gelirgider:['Gelir / Gider'],
    personel:['Personel'],
    cekler:['Çek / Senet'],
    uretim:['Üretim'],
    bilanco:['Üretim','Haftalık Bilanço'],
    cektakvim:['Finans Analiz','Çek Takvimi'],
    mutabakat:['Finans Analiz','Mutabakat'],
    tahsilatoneri:['Finans Analiz','Tahsilat Önerisi'],
    karlilik:['Finans Analiz','Kârlılık'],
    stokDetay:['Stok','Stok Detay'],
    ayarlar:['Yönetim','Ayarlar'],
    loglar:['Yönetim','Loglar']
  };
  const crumbs=meta[page]||[page];

  const render=()=>{
    if(page==='dashboard')return <Dashboard onOpenCustomer={openCustomer}/>;
    if(page==='ekstre')return <Ekstre initialCustomerId={focus} onOpenCustomer={openCustomer} onOpenModal={openModal}/>;
    if(page==='cariler')return <CariList onOpen={openCustomer} onNew={()=>setModal({kind:'newcari'})}/>;
    if(page==='cari')return <CustomerDetail customerId={focus||CUSTOMERS[0]?.id} onOpenEkstre={openEkstre} onBack={()=>nav('cariler')} onOpenModal={openModal}/>;
    if(page==='hareketler')return <Hareketler onNew={()=>setModal({kind:'hareket'})}/>;
    if(page==='firmalar')return <FirmalarPage onNew={()=>setModal({kind:'firma'})}/>;
    if(page==='stok')return <StokPage onNew={()=>setModal({kind:'newstok'})} onNewHrk={()=>setModal({kind:'stokhrk'})} onOpenDetay={openStokDetay}/>;
    if(page==='kasa')return <Kasa onNew={()=>setModal({kind:'kasa'})}/>;
    if(page==='gelirgider')return <GelirGider onNew={()=>setModal({kind:'newgg'})}/>;
    if(page==='personel')return <PersonelPage onNew={()=>setModal({kind:'personel'})} onMesai={(id)=>setModal({kind:'mesai',personelId:id})}/>;
    if(page==='cekler')return <CeklerPage onNew={(tab)=>setModal({kind:'cek',cekTip:tab==='alinan'?'ALINAN':'VERILEN'})}/>;
    if(page==='uretim')return <UretimPage onNew={()=>setModal({kind:'uretim'})} onView={(id)=>setModal({kind:'uretim',uretimId:id})}/>;
    if(page==='bilanco')return <HaftalikBilanco/>;
    if(page==='cektakvim')return <CekTakvim/>;
    if(page==='mutabakat')return <MutabakatPage/>;
    if(page==='tahsilatoneri')return <TahsilatOneri/>;
    if(page==='karlilik')return <KarlilikPage/>;
    if(page==='stokDetay')return <StokDetay urunKod={focus} onBack={()=>nav('stok')}/>;
    if(page==='ayarlar')return <Ayarlar/>;
    if(page==='loglar')return <LoglarPage onView={(log)=>setModal({kind:'logdetay',log})}/>;
    return <div className="card" style={{padding:'72px 36px',textAlign:'center'}}>
      <div style={{fontSize:22,fontWeight:600,letterSpacing:'-0.02em',marginBottom:6}}>{crumbs[crumbs.length-1]}</div>
      <div style={{color:'var(--text-3)',fontSize:13,maxWidth:440,margin:'0 auto'}}>Bu modül henüz tasarıma eklenmedi. Repo'daki <span className="mono" style={{color:'var(--text-2)'}}>pages/{page}.py</span> tabanlı eklenebilir.</div>
      <div style={{marginTop:20}}><button className="btn" onClick={()=>nav('dashboard')}>← Bilgi Ekranı</button></div>
    </div>;
  };

  return <div id="root" data-screen-label={page}>
    <Sidebar page={page} onNav={nav}/>
    <div className="main">
      <Topbar crumbs={crumbs}/>
      <div className="content"><div className="wrap">
        {loading && dataVersion===0 ? <div className="card" style={{padding:48,textAlign:'center'}}>
          <div style={{fontSize:14,color:'var(--text-2)'}}>Veri yükleniyor…</div>
        </div> : render()}
      </div></div>
    </div>
    {modal&&modal.kind==='collection'&&<TxModal kind={modal.kind} customerId={modal.customerId} onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='payment'&&<TxModal kind={modal.kind} customerId={modal.customerId} onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='newcari'&&<NewCariModal onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='newstok'&&<NewStokModal onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='stokhrk'&&<StokHrkModal onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='newgg'&&<NewGGModal onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='hareket'&&<HareketModal onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='kasa'&&<KasaModal onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='personel'&&<PersonelModal onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='mesai'&&<MesaiModal personelId={modal.personelId} onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='cek'&&<CekModal tip={modal.cekTip} onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='firma'&&<FirmaModal onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='uretim'&&<UretimModal onClose={()=>setModal(null)} onSaved={(m)=>{setModal(null);setToast(m);window.__reload?.();}}/>}
    {modal&&modal.kind==='logdetay'&&<LogDetayModal log={modal.log} onClose={()=>setModal(null)}/>}
    {toast&&<Toast m={toast} onDone={()=>setToast(null)}/>}
    {tweaks&&<div className="tw">
      <div><div className="tw-ttl">Tweaks</div><div style={{fontSize:12.5,fontWeight:500,marginTop:2}}>Tema</div></div>
      <div className="hstack" style={{gap:7}}><ISun size={13} style={{color:theme==='light'?'var(--text)':'var(--text-3)'}}/><button className={`tg ${theme==='dark'?'on':''}`} onClick={()=>setKey('theme',theme==='dark'?'light':'dark')}/><IMoon size={13} style={{color:theme==='dark'?'var(--text)':'var(--text-3)'}}/></div>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
