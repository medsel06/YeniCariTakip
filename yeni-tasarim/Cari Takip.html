<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<title>ŞENOL ÇELİK — Cari Takip</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: oklch(0.992 0.003 240);
  --panel: #ffffff;
  --panel-soft: oklch(0.975 0.004 240);
  --border: oklch(0.92 0.005 240);
  --border-strong: oklch(0.86 0.006 240);
  --text: oklch(0.22 0.01 250);
  --text-soft: oklch(0.45 0.01 250);
  --text-dim: oklch(0.58 0.008 250);
  --accent: oklch(0.62 0.14 150);
  --accent-soft: oklch(0.95 0.04 150);
  --accent-ink: oklch(0.38 0.12 150);
  --danger: oklch(0.58 0.17 28);
  --danger-soft: oklch(0.96 0.03 28);
  --warn: oklch(0.72 0.14 75);
  --warn-soft: oklch(0.96 0.04 75);
  --shadow-sm: 0 1px 2px oklch(0.2 0.02 250 / 0.05);
  --shadow-md: 0 4px 16px oklch(0.2 0.02 250 / 0.07), 0 1px 3px oklch(0.2 0.02 250 / 0.04);
  --shadow-lg: 0 20px 40px oklch(0.2 0.02 250 / 0.12), 0 2px 6px oklch(0.2 0.02 250 / 0.05);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  color-scheme: light;
}
[data-theme="dark"] {
  --bg: oklch(0.18 0.01 250);
  --panel: oklch(0.22 0.012 250);
  --panel-soft: oklch(0.20 0.012 250);
  --border: oklch(0.30 0.012 250);
  --border-strong: oklch(0.36 0.012 250);
  --text: oklch(0.96 0.005 250);
  --text-soft: oklch(0.75 0.008 250);
  --text-dim: oklch(0.60 0.008 250);
  --accent: oklch(0.72 0.16 150);
  --accent-soft: oklch(0.30 0.05 150);
  --accent-ink: oklch(0.85 0.14 150);
  --danger: oklch(0.70 0.18 28);
  --danger-soft: oklch(0.32 0.06 28);
  --warn: oklch(0.78 0.14 75);
  --warn-soft: oklch(0.32 0.06 75);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
  --shadow-lg: 0 20px 40px rgba(0,0,0,0.45);
  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Figtree', system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
.num, .tabular { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
svg { display: block; }

#root { display: flex; min-height: 100vh; }

/* ============ SIDEBAR ============ */
.sidebar {
  width: 244px; flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.sb-logo {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--text); color: var(--bg);
  display: grid; place-items: center;
  font-weight: 700; font-size: 14px; letter-spacing: -0.02em;
}
.sb-brand-name { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
.sb-brand-sub { font-size: 11px; color: var(--text-dim); margin-top: -2px; }

.sb-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); padding: 14px 18px 6px; font-weight: 600; }
.sb-nav { padding: 6px 10px; display: flex; flex-direction: column; gap: 1px; }
.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  color: var(--text-soft); font-size: 13.5px; font-weight: 500;
  width: 100%; text-align: left;
}
.sb-item:hover { background: var(--panel-soft); color: var(--text); }
.sb-item.active { background: var(--accent-soft); color: var(--accent-ink); font-weight: 600; }
.sb-item.active svg { color: var(--accent); }
.sb-item svg { color: var(--text-dim); flex-shrink: 0; }
.sb-item.active svg { color: var(--accent-ink); }
.sb-badge { margin-left: auto; font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
.sb-item.active .sb-badge { color: var(--accent-ink); }

.sb-foot { margin-top: auto; padding: 14px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: oklch(0.85 0.03 150); color: var(--accent-ink); display: grid; place-items: center; font-weight: 600; font-size: 12px; flex-shrink: 0; }
.sb-user-name { font-size: 13px; font-weight: 500; }
.sb-user-role { font-size: 11px; color: var(--text-dim); }

/* ============ MAIN ============ */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 28px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 20;
}
.tb-title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
.tb-crumb { font-size: 12px; color: var(--text-dim); }
.tb-spacer { flex: 1; }
.tb-search {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--panel-soft); width: 300px;
  transition: border-color 0.15s, background 0.15s;
}
.tb-search:focus-within { border-color: var(--accent); background: var(--panel); }
.tb-search input { flex: 1; border: none; background: none; outline: none; font-size: 13px; }
.tb-search kbd { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-dim); border: 1px solid var(--border-strong); padding: 1px 5px; border-radius: 4px; background: var(--panel); }

.content { flex: 1; padding: 24px 28px 48px; overflow-x: auto; }

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border-strong); background: var(--panel); color: var(--text);
  transition: all 0.12s;
}
.btn:hover { background: var(--panel-soft); border-color: var(--text-dim); }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); color: white; }
.btn-ghost { border-color: transparent; background: transparent; color: var(--text-soft); }
.btn-ghost:hover { background: var(--panel-soft); color: var(--text); }
.btn-sm { padding: 5px 9px; font-size: 12px; }
.btn-icon { padding: 7px; }

/* ============ CARDS ============ */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.card-hd { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.card-ttl { font-size: 14px; font-weight: 600; }
.card-sub { font-size: 12px; color: var(--text-dim); }

/* ============ KPI ============ */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.kpi {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 18px;
  position: relative; overflow: hidden;
}
.kpi-label { font-size: 12px; color: var(--text-soft); font-weight: 500; display: flex; align-items: center; gap: 6px; }
.kpi-val { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; margin-top: 6px; }
.kpi-delta { font-size: 12px; color: var(--text-dim); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.kpi-delta.up { color: var(--accent-ink); }
.kpi-delta.down { color: var(--danger); }

/* ============ TABLE ============ */
.tbl-wrap { overflow-x: auto; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
table.tbl thead th {
  text-align: left; padding: 10px 14px;
  font-size: 11.5px; font-weight: 600; color: var(--text-soft);
  text-transform: uppercase; letter-spacing: 0.06em;
  background: var(--panel-soft);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.tbl tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
table.tbl tbody tr { transition: background 0.1s; }
table.tbl tbody tr:hover { background: var(--panel-soft); cursor: pointer; }
table.tbl tbody tr:last-child td { border-bottom: none; }
.td-right { text-align: right; }
.td-center { text-align: center; }
.td-num { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; text-align: right; }
.td-date { font-family: 'IBM Plex Mono', monospace; color: var(--text-soft); font-size: 12.5px; }
.td-ref { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim); }

/* Badges */
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11.5px; font-weight: 500; white-space: nowrap; }
.chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.chip-green { background: var(--accent-soft); color: var(--accent-ink); }
.chip-green .chip-dot { background: var(--accent); }
.chip-red { background: var(--danger-soft); color: var(--danger); }
.chip-red .chip-dot { background: var(--danger); }
.chip-warn { background: var(--warn-soft); color: oklch(0.45 0.13 75); }
.chip-warn .chip-dot { background: var(--warn); }
.chip-neutral { background: var(--panel-soft); color: var(--text-soft); border: 1px solid var(--border); }
.chip-neutral .chip-dot { background: var(--text-dim); }

.balance-chip {
  display: inline-flex; align-items: baseline; gap: 8px;
  padding: 5px 12px; border-radius: 999px;
  background: var(--accent-soft); color: var(--accent-ink);
  font-weight: 600;
}
.balance-chip.neg { background: var(--danger-soft); color: var(--danger); }
.balance-chip .bc-label { font-size: 10.5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.75; }
.balance-chip .bc-val { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; }

/* Filter bar */
.filterbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.flt {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 11px; border-radius: 8px;
  border: 1px solid var(--border-strong); background: var(--panel);
  font-size: 13px; font-weight: 500; color: var(--text);
  transition: all 0.12s;
}
.flt:hover { border-color: var(--text-dim); }
.flt.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-ink); }
.flt svg { color: var(--text-dim); }
.flt.active svg { color: var(--accent-ink); }
.flt select { border: none; background: transparent; outline: none; cursor: pointer; color: inherit; font-weight: 500; font-size: 13px; appearance: none; padding-right: 16px; }

.seg { display: inline-flex; border: 1px solid var(--border-strong); border-radius: 8px; overflow: hidden; background: var(--panel); }
.seg button { padding: 6px 12px; font-size: 12.5px; font-weight: 500; color: var(--text-soft); border-right: 1px solid var(--border); transition: all 0.1s; }
.seg button:last-child { border-right: none; }
.seg button:hover { background: var(--panel-soft); color: var(--text); }
.seg button.active { background: var(--accent-soft); color: var(--accent-ink); font-weight: 600; }

/* Modal */
.modal-scrim { position: fixed; inset: 0; background: oklch(0.2 0.01 250 / 0.42); backdrop-filter: blur(3px); display: grid; place-items: center; z-index: 100; animation: fadeIn 0.15s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.modal {
  background: var(--panel); border-radius: 14px; border: 1px solid var(--border);
  width: 520px; max-width: calc(100vw - 40px); max-height: calc(100vh - 40px);
  box-shadow: var(--shadow-lg);
  overflow: hidden; display: flex; flex-direction: column;
  animation: slideUp 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.modal-hd { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.modal-ttl { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.modal-bd { padding: 20px 22px; overflow-y: auto; }
.modal-ft { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; background: var(--panel-soft); }

.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 12px; font-weight: 500; color: var(--text-soft); }
.field input, .field select, .field textarea {
  padding: 9px 11px; border: 1px solid var(--border-strong); border-radius: 7px;
  background: var(--panel); font-size: 13.5px; outline: none;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.type-pick { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.type-pick label {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: 10px;
  cursor: pointer; transition: all 0.12s;
}
.type-pick label:hover { border-color: var(--text-dim); }
.type-pick input { display: none; }
.type-pick input:checked + .tp-body { color: var(--accent-ink); }
.type-pick label:has(input:checked) { border-color: var(--accent); background: var(--accent-soft); }
.tp-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--panel-soft); display: grid; place-items: center; color: var(--text-soft); flex-shrink: 0; }
.type-pick label:has(input:checked) .tp-icon { background: var(--accent); color: white; }
.type-pick label:has(input[value="payment"]:checked) { border-color: var(--danger); background: var(--danger-soft); }
.type-pick label:has(input[value="payment"]:checked) .tp-icon { background: var(--danger); color: white; }
.type-pick label:has(input[value="payment"]:checked) .tp-body { color: var(--danger); }
.tp-ttl { font-size: 13.5px; font-weight: 600; }
.tp-sub { font-size: 11.5px; color: var(--text-dim); }

/* Tweaks panel */
.tweaks {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--panel); border: 1px solid var(--border-strong); border-radius: 12px;
  box-shadow: var(--shadow-lg);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  z-index: 90;
  animation: slideUp 0.2s;
}
.tweak-ttl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
.toggle { position: relative; width: 36px; height: 20px; background: var(--border-strong); border-radius: 999px; cursor: pointer; transition: background 0.2s; }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: white; box-shadow: var(--shadow-sm); transition: transform 0.2s; }
.toggle.on { background: var(--accent); }
.toggle.on::after { transform: translateX(16px); }

/* Dashboard specifics */
.two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
.top-customers .row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid var(--border); }
.top-customers .row:last-child { border-bottom: none; }
.tc-rank { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim); width: 20px; }
.tc-name { flex: 1; font-weight: 500; font-size: 13.5px; }
.tc-bar { width: 100px; height: 4px; background: var(--panel-soft); border-radius: 999px; overflow: hidden; }
.tc-bar-fill { height: 100%; background: var(--accent); }
.tc-val { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--text-soft); width: 110px; text-align: right; }

/* Customer detail specifics */
.cd-hero { display: flex; align-items: flex-start; gap: 20px; padding: 20px 22px; border-bottom: 1px solid var(--border); }
.cd-avatar { width: 54px; height: 54px; border-radius: 12px; background: linear-gradient(135deg, var(--accent-soft), oklch(0.9 0.05 150)); color: var(--accent-ink); display: grid; place-items: center; font-weight: 700; font-size: 20px; flex-shrink: 0; }
.cd-name { font-size: 20px; font-weight: 600; letter-spacing: -0.015em; }
.cd-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 6px; font-size: 12.5px; color: var(--text-soft); }
.cd-meta span { display: flex; align-items: center; gap: 5px; }
.cd-stats { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--border); }
.cd-stat { padding: 14px 20px; border-right: 1px solid var(--border); }
.cd-stat:last-child { border-right: none; }
.cd-stat-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); font-weight: 600; }
.cd-stat-val { font-size: 18px; font-weight: 600; margin-top: 4px; letter-spacing: -0.015em; }
.cd-stat-sub { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }

/* Simple chart */
.spark { width: 100%; height: 140px; }

/* Report page */
.rp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Empty / toasts */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg); z-index: 200; animation: slideUp 0.2s; }

/* utility */
.muted { color: var(--text-dim); }
.hstack { display: flex; align-items: center; gap: 8px; }
.vstack { display: flex; flex-direction: column; gap: 4px; }
.grow { flex: 1; }
.pos { color: var(--accent-ink); }
.neg { color: var(--danger); }

/* Scrollbar polish */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
::-webkit-scrollbar-track { background: transparent; }
</style>
</head>

<script type="text/babel" data-presets="react">

// ==== src/icons.jsx ====
// Icon components — line icons at 18px default, following a neutral stroke style.
const Icon = ({ d, size = 18, stroke = 1.6, children, ...rest }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" {...rest}>
    {d ? <path d={d} /> : children}
  </svg>
);

const IconDashboard = (p) => <Icon {...p}><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></Icon>;
const IconCari = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;

const fmtTL = (n, opts = {}) => {
  const sign = n < 0 ? '-' : '';
  const abs = Math.abs(n);
  const s = abs.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return `${sign}${s} ${opts.noSuffix ? '' : '₺'}`.trim();
};
const fmtTLShort = (n) => {
  const abs = Math.abs(n);
  if (abs >= 1e6) return `${(n/1e6).toFixed(1).replace('.', ',')} M ₺`;
  if (abs >= 1e3) return `${(n/1e3).toFixed(0)} B ₺`;
  return fmtTL(n);
};

const DOC_TYPES = ['fatura', 'tahsilat', 'cek', 'odeme', 'iade'];

const DOC_CHIP = { fatura: 'neutral', tahsilat: 'green', cek: 'warn', odeme: 'red', iade: 'neutral' };

// Deterministic pseudo-random
function seeded(seed) {
  let x = seed;
  return () => { x = (x * 16807) % 2147483647; return (x - 1) / 2147483646; };
}

function genTransactions() {
  const rnd = seeded(42);
  const tx = [];
  let id = 10000;
  const today = new Date('2026-04-19');
  CUSTOMERS.forEach(c => {
    const count = Math.floor(rnd() * 18) + 8;
    let running = 0;
    const entries = [];
    for (let i = 0; i < count; i++) {
      const daysAgo = Math.floor(rnd() * 180);
      const d = new Date(today); d.setDate(d.getDate() - daysAgo);
      let type;
      const r = rnd();
      if (r < 0.55) type = 'fatura';
      else if (r < 0.85) type = 'tahsilat';
      else if (r < 0.93) type = 'cek';
      else if (r < 0.98) type = 'odeme';
      else type = 'iade';
      let amount;
      if (type === 'fatura') amount = +(rnd() * 45000 + 3500).toFixed(2);
      else if (type === 'tahsilat') amount = +(rnd() * 30000 + 5000).toFixed(2);
      else if (type === 'cek') amount = +(rnd() * 25000 + 5000).toFixed(2);
      else if (type === 'odeme') amount = +(rnd() * 8000 + 1000).toFixed(2);
      else amount = +(rnd() * 6000 + 500).toFixed(2);

      const borc = (type === 'fatura') ? amount : 0;
      const alacak = (type === 'tahsilat' || type === 'cek' || type === 'odeme' || type === 'iade') ? amount : 0;
      running += borc - alacak;

      entries.push({
        id: `T-${++id}`,
        customerId: c.id,
        date: d.toISOString().slice(0, 10),
        type,
        ref: refFor(type, id, rnd),
        description: descFor(type, c, rnd),
        borc, alacak,
        running: 0, // computed below
      });
    }
    entries.sort((a, b) => a.date.localeCompare(b.date));
    let run = 0;
    entries.forEach(e => { run += e.borc - e.alacak; e.running = run; });
    tx.push(...entries);
  });
  return tx;
}

function refFor(type, n, rnd) {
  const ys = '2026';
  if (type === 'fatura') return `FT${ys}-${String(n).padStart(5, '0')}`;
  if (type === 'iade') return `IF${ys}-${String(n).padStart(5, '0')}`;
  if (type === 'tahsilat') return `TH${ys}-${String(n).padStart(5, '0')}`;
  if (type === 'cek') return `CK${ys}-${String(n).padStart(5, '0')}`;
  if (type === 'odeme') return `OD${ys}-${String(n).padStart(5, '0')}`;
  return String(n);
}
function descFor(type, c, rnd) {
  const products = ['Ø12 İnşaat demiri', 'Ø16 nervürlü demir', 'HEA 120 profil', 'Kare profil 40x40', 'Sac levha 2mm', 'L köşebent 50x50', 'U demir', 'IPE 200', 'Galvaniz tel', 'Hasır çelik Q188'];
  const p = products[Math.floor(rnd() * products.length)];
  const tonaj = +(rnd() * 8 + 0.5).toFixed(1);
  if (type === 'fatura') return `${p} — ${tonaj} ton`;
  if (type === 'iade') return `${p} — iade`;
  if (type === 'tahsilat') return ['Havale', 'EFT', 'Nakit tahsilat', 'Kredi kartı'][Math.floor(rnd() * 4)];
  if (type === 'cek') {
    const d = new Date('2026-04-19'); d.setDate(d.getDate() + Math.floor(rnd() * 90) + 30);
    return `Vadeli çek — ${fmtDate(d)}`;
  }
  if (type === 'odeme') return 'Banka masrafı / komisyon';
  return '';
}

function Chip({ kind = 'neutral', children, dot = true }) {

function Sparkline({ data, color = 'var(--accent)', height = 50, fill = true }) {
  if (!data || !data.length) return null;
  const w = 280, h = height, pad = 4;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => [
    pad + (i / (data.length - 1)) * (w - pad * 2),
    h - pad - ((v - min) / range) * (h - pad * 2)
  ]);
  const path = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = path + ` L${w - pad},${h - pad} L${pad},${h - pad} Z`;
  return (
    <svg className="spark" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: '100%', height }}>
      {fill && <path d={area} fill={color} opacity="0.12" />}
      <path d={path} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

function BarChart({ data, labels, height = 160, color = 'var(--accent)' }) {
  const max = Math.max(...data) || 1;
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10, height, padding: '0 4px' }}>
      {data.map((v, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
          <div style={{ flex: 1, width: '100%', display: 'flex', alignItems: 'flex-end' }}>
            <div style={{ width: '100%', height: `${(v / max) * 100}%`, background: color, borderRadius: '4px 4px 0 0', opacity: i === data.length - 1 ? 1 : 0.75, transition: 'height 0.3s' }} />
          </div>
          <div style={{ fontSize: 10.5, color: 'var(--text-dim)', fontFamily: 'IBM Plex Mono, monospace' }}>{labels[i]}</div>
        </div>
      ))}
    </div>
  );
}

function Ekstre({ initialCustomerId, search, onOpenCustomer }) {
  const [selected, setSelected] = React.useState(initialCustomerId || CUSTOMERS[0].id);
  const [typeFilter, setTypeFilter] = React.useState('all');
  const [range, setRange] = React.useState('90');
  const [localSearch, setLocalSearch] = React.useState('');

  React.useEffect(() => { if (initialCustomerId) setSelected(initialCustomerId); }, [initialCustomerId]);

  const customer = CUSTOMERS.find(c => c.id === selected);
  const q = (search || localSearch || '').toLowerCase().trim();

  let txs = TRANSACTIONS.filter(t => t.customerId === selected);
  if (typeFilter !== 'all') txs = txs.filter(t => t.type === typeFilter);
  if (range !== 'all') {
    const days = parseInt(range, 10);
    const cutoff = new Date('2026-04-19'); cutoff.setDate(cutoff.getDate() - days);
    txs = txs.filter(t => new Date(t.date) >= cutoff);
  }
  if (q) txs = txs.filter(t => (t.ref + ' ' + t.description).toLowerCase().includes(q));
  txs = [...txs].sort((a, b) => b.date.localeCompare(a.date));

  const toplamBorc = txs.reduce((s, t) => s + t.borc, 0);
  const toplamAlacak = txs.reduce((s, t) => s + t.alacak, 0);

  const filteredCustomers = CUSTOMERS.filter(c => q ? c.name.toLowerCase().includes(q) : true);

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '280px 1fr', gap: 16 }}>

                borderBottom: '1px solid var(--border)',
                background: selected === c.id ? 'var(--accent-soft)' : 'transparent',
                borderLeft: selected === c.id ? '3px solid var(--accent)' : '3px solid transparent',
                transition: 'background 0.1s'
              }}
            >
              <div style={{ flex: 1, minWidth: 0 }}>

                <div className="num" style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 2 }}>{c.code}</div>
              </div>
              <div className="num" style={{ fontSize: 12, fontWeight: 600, color: c.balance < 0 ? 'var(--danger)' : 'var(--accent-ink)', whiteSpace: 'nowrap' }}>

        </div>

          <div className="seg">

          </div>
          <div className="card" style={{ padding: '14px 18px' }}>
            <div className="kpi-label">Net Bakiye</div>
            <div className={`num ${customer.balance < 0 ? 'neg' : ''}`} style={{ fontSize: 20, fontWeight: 600, marginTop: 4 }}>{fmtTL(customer.balance)}</div>
          </div>
        </div>

        {/* Transactions */}
        <div className="card">
          <div className="card-hd">
            <div className="card-ttl">Hareketler</div>
            <span className="muted" style={{ fontSize: 12 }}>{txs.length} kayıt</span>
            <div className="grow" />
            <button className="btn-ghost btn btn-sm"><IconSort size={13} /> Sırala</button>
          </div>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead>
                <tr>

                  <th style={{ width: 140 }}>Belge No</th>
                  <th>Açıklama</th>
                  <th style={{ width: 130 }}>Tip</th>
                  <th className="td-right" style={{ width: 130 }}>Borç</th>

                  </tr>

              {txs.length > 0 && (

function CustomerDetail({ customerId, onOpenEkstre, onBack }) {
  const c = CUSTOMERS.find(c => c.id === customerId);
  const txs = TRANSACTIONS.filter(t => t.customerId === customerId).sort((a, b) => b.date.localeCompare(a.date));

  // 30-day balance series for sparkline
  const series = React.useMemo(() => {
    const sorted = [...TRANSACTIONS.filter(t => t.customerId === customerId)].sort((a, b) => a.date.localeCompare(b.date));
    let r = 0;
    const pts = sorted.map(t => { r += t.borc - t.alacak; return r; });
    return pts.length > 1 ? pts : [0, 0];
  }, [customerId]);

  const totalFatura = txs.filter(t => t.type === 'fatura').reduce((s, t) => s + t.borc, 0);
  const totalTahsilat = txs.filter(t => t.type === 'tahsilat' || t.type === 'cek').reduce((s, t) => s + t.alacak, 0);

              <span className="hstack" style={{ gap: 5 }}><IconMail size={12} />{c.email}</span>
              <span>VKN: <span className="num">{c.tax}</span> · {c.taxOffice}</span>

function Report() {
  const [period, setPeriod] = React.useState('month');

  const byCity = {};
  CUSTOMERS.forEach(c => { byCity[c.city] = (byCity[c.city] || 0) + Math.max(0, c.balance); });
  const cities = Object.entries(byCity).sort((a, b) => b[1] - a[1]);
  const maxCity = cities[0]?.[1] || 1;

  const typeTotals = {};
  TRANSACTIONS.forEach(t => {
    typeTotals[t.type] = (typeTotals[t.type] || 0) + (t.borc || t.alacak);
  });
  const typeArr = Object.entries(typeTotals).map(([k, v]) => ({ k, v }));
  const maxType = Math.max(...typeArr.map(t => t.v));

  const aging = [
    { label: '0–30 gün', value: 412500, color: 'var(--accent)' },
    { label: '31–60 gün', value: 284300, color: 'oklch(0.72 0.12 130)' },
    { label: '61–90 gün', value: 128400, color: 'var(--warn)' },
    { label: '90+ gün', value: 62800, color: 'var(--danger)' },
  ];
  const totalAging = aging.reduce((s, a) => s + a.value, 0);

  return (
    <div>
      {/* Filter strip */}
      <div className="card" style={{ marginBottom: 16, padding: '14px 18px' }}>
        <div className="hstack" style={{ gap: 12, flexWrap: 'wrap' }}>
          <div className="seg">
            {[['week', 'Bu Hafta'], ['month', 'Bu Ay'], ['quarter', 'Çeyrek'], ['year', '2026']].map(([k, l]) => (
              <button key={k} className={period === k ? 'active' : ''} onClick={() => setPeriod(k)}>{l}</button>
            ))}
          </div>
          <div className="flt"><IconCal size={14} /><span className="num" style={{ fontSize: 12.5 }}>01.04.2026 — 30.04.2026</span></div>
          <div className="flt"><IconTag size={14} /><span>Tüm Belgeler</span><IconChevDown size={13} /></div>
          <div className="flt"><IconFilter size={14} /><span>Tüm Şubeler</span><IconChevDown size={13} /></div>
          <div className="grow" />
          <button className="btn btn-sm"><IconPdf size={14} /> PDF Rapor</button>
          <button className="btn btn-sm"><IconXls size={14} /> Excel</button>
        </div>
      </div>

      {/* KPIs */}
      <div className="kpi-grid">
        <div className="kpi"><div className="kpi-label">Cari Hesap Sayısı</div><div className="kpi-val num">{CUSTOMERS.length}</div><div className="kpi-delta">+2 bu ay</div></div>
        <div className="kpi"><div className="kpi-label">Dönem Faturası</div><div className="kpi-val num">{fmtTL(TRANSACTIONS.filter(t => t.type === 'fatura').reduce((s, t) => s + t.borc, 0))}</div><div className="kpi-delta up"><IconArrowUp size={12} /> %12 artış</div></div>
        <div className="kpi"><div className="kpi-label">Tahsil Edilen</div><div className="kpi-val num">{fmtTL(TRANSACTIONS.filter(t => t.type === 'tahsilat').reduce((s, t) => s + t.alacak, 0))}</div><div className="kpi-delta up"><IconArrowUp size={12} /> %8 artış</div></div>
        <div className="kpi"><div className="kpi-label">Tahsilat Oranı</div><div className="kpi-val num">%68,4</div><div className="kpi-delta">Hedef: %75</div></div>
      </div>

      <div className="rp-grid">
        {/* Aging */}
        <div className="card">
          <div className="card-hd">
            <div>
              <div className="card-ttl">Yaşlandırma Analizi</div>
              <div className="card-sub">Vade tarihine göre açık alacaklar</div>
            </div>
          </div>
          <div style={{ padding: '18px 20px' }}>
            <div style={{ display: 'flex', height: 14, borderRadius: 7, overflow: 'hidden', marginBottom: 14 }}>
              {aging.map(a => (
                <div key={a.label} style={{ width: `${(a.value / totalAging) * 100}%`, background: a.color }} />
              ))}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {aging.map(a => (
                <div key={a.label} className="hstack">
                  <span style={{ width: 10, height: 10, borderRadius: 3, background: a.color }} />
                  <span style={{ flex: 1, fontSize: 13 }}>{a.label}</span>
                  <span className="num" style={{ fontSize: 12.5, color: 'var(--text-dim)', width: 50, textAlign: 'right' }}>%{((a.value / totalAging) * 100).toFixed(0)}</span>
                  <span className="num" style={{ fontWeight: 600, width: 140, textAlign: 'right' }}>{fmtTL(a.value)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* City breakdown */}
        <div className="card">
          <div className="card-hd">
            <div>
              <div className="card-ttl">Şehir Bazlı Alacak</div>
              <div className="card-sub">Toplam açık alacak dağılımı</div>
            </div>
          </div>
          <div style={{ padding: '12px 0' }}>
            {cities.map(([city, val]) => (
              <div key={city} style={{ padding: '10px 20px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: '1px solid var(--border)' }}>
                <span style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{city}</span>
                <div style={{ width: 120, height: 4, background: 'var(--panel-soft)', borderRadius: 999, overflow: 'hidden' }}>
                  <div style={{ height: '100%', background: 'var(--accent)', width: `${(val / maxCity) * 100}%` }} />
                </div>
                <span className="num" style={{ width: 110, textAlign: 'right', fontWeight: 600, fontSize: 12.5 }}>{fmtTL(val)}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Doc type breakdown */}
        <div className="card" style={{ gridColumn: 'span 2' }}>
          <div className="card-hd">
            <div>
              <div className="card-ttl">Belge Tipi Dağılımı</div>
              <div className="card-sub">Tüm hareketler · Nisan 2026</div>
            </div>
          </div>
          <div className="tbl-wrap">
            <table className="tbl">
              <thead><tr><th>Belge Tipi</th><th>Adet</th><th>Toplam Tutar</th><th>Ortalama</th><th style={{ width: '40%' }}>Oran</th></tr></thead>
              <tbody>
                {typeArr.map(({ k, v }) => {
                  const count = TRANSACTIONS.filter(t => t.type === k).length;
                  return (
                    <tr key={k}>
                      <td><DocTypeBadge type={k} /></td>
                      <td className="num">{count}</td>
                      <td className="td-num" style={{ fontWeight: 600 }}>{fmtTL(v)}</td>
                      <td className="td-num">{fmtTL(v / count)}</td>
                      <td>
                        <div className="hstack" style={{ gap: 8 }}>
                          <div style={{ flex: 1, height: 6, background: 'var(--panel-soft)', borderRadius: 999, overflow: 'hidden' }}>
                            <div style={{ height: '100%', background: 'var(--accent)', width: `${(v / maxType) * 100}%` }} />
                          </div>
                          <span className="num muted" style={{ fontSize: 12, width: 46, textAlign: 'right' }}>%{((v / typeArr.reduce((s, t) => s + t.v, 0)) * 100).toFixed(0)}</span>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

window.Report = Report;


// ==== src/modal.jsx ====
function TxModal({ kind, customerId, onClose, onSaved }) {
  const [type, setType] = React.useState(kind === 'payment' ? 'payment' : 'collection');
  const [cust, setCust] = React.useState(customerId || CUSTOMERS[0].id);
  const [amount, setAmount] = React.useState('');
  const [method, setMethod] = React.useState('havale');
  const [date, setDate] = React.useState('2026-04-19');
  const [note, setNote] = React.useState('');

  const customer = CUSTOMERS.find(c => c.id === cust);

  const submit = (e) => {
    e.preventDefault();
    onSaved?.(type === 'collection' ? 'Tahsilat kaydedildi.' : 'Ödeme kaydedildi.');
  };

  const isCollection = type === 'collection';

  return (
    <div className="modal-scrim" onClick={onClose}>
      <form className="modal" onClick={e => e.stopPropagation()} onSubmit={submit}>
        <div className="modal-hd">
          <div style={{ width: 34, height: 34, borderRadius: 9, background: isCollection ? 'var(--accent-soft)' : 'var(--danger-soft)', color: isCollection ? 'var(--accent-ink)' : 'var(--danger)', display: 'grid', placeItems: 'center' }}>
            {isCollection ? <IconArrowUp size={16} /> : <IconArrowDown size={16} />}
          </div>
          <div style={{ flex: 1 }}>
            <div className="modal-ttl">Yeni {isCollection ? 'Tahsilat' : 'Ödeme'}</div>
            <div className="muted" style={{ fontSize: 12 }}>Cari hesaba kayıt oluştur</div>
          </div>
          <button type="button" className="btn btn-icon btn-ghost" onClick={onClose}><IconX size={16} /></button>
        </div>
        <div className="modal-bd">
          <div className="field">
            <label>İşlem Tipi</label>
            <div className="type-pick">
              <label>
                <input type="radio" name="type" value="collection" checked={type === 'collection'} onChange={() => setType('collection')} />
                <div className="tp-icon"><IconArrowUp size={14} /></div>
                <div className="tp-body">
                  <div className="tp-ttl">Tahsilat</div>
                  <div className="tp-sub">Cariden para giriş</div>
                </div>
              </label>
              <label>
                <input type="radio" name="type" value="payment" checked={type === 'payment'} onChange={() => setType('payment')} />
                <div className="tp-icon"><IconArrowDown size={14} /></div>
                <div className="tp-body">
                  <div className="tp-ttl">Ödeme</div>
                  <div className="tp-sub">Cariye para çıkış</div>
                </div>
              </label>
            </div>
          </div>

          <div className="field">
            <label>Cari Hesap</label>
            <select value={cust} onChange={e => setCust(e.target.value)}>
              {CUSTOMERS.map(c => <option key={c.id} value={c.id}>{c.name}  ·  {c.code}</option>)}
            </select>
            {customer && (
              <div style={{ marginTop: 8, padding: '8px 12px', background: 'var(--panel-soft)', borderRadius: 7, display: 'flex', alignItems: 'center', gap: 10, fontSize: 12 }}>
                <span className="muted">Mevcut bakiye:</span>
                <BalanceChip value={customer.balance} />
                <span className="grow" />
                <span className="muted">Limit: <span className="num">{fmtTL(customer.credit)}</span></span>
              </div>
            )}
          </div>

          <div className="field-row">
            <div className="field">
              <label>Tutar (₺)</label>
              <input type="text" placeholder="0,00" value={amount} onChange={e => setAmount(e.target.value)} style={{ fontFamily: 'IBM Plex Mono, monospace', fontSize: 16, fontWeight: 600, textAlign: 'right' }} autoFocus />
            </div>
            <div className="field">
              <label>Tarih</label>
              <input type="date" value={date} onChange={e => setDate(e.target.value)} />
            </div>
          </div>

          <div className="field">
            <label>Tahsilat Şekli</label>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6 }}>
              {[
                { k: 'nakit', l: 'Nakit' },
                { k: 'havale', l: 'Havale/EFT' },
                { k: 'kredi', l: 'Kredi Kartı' },
                { k: 'cek', l: 'Çek/Senet' },
              ].map(m => (
                <button key={m.k} type="button" className={`flt ${method === m.k ? 'active' : ''}`} onClick={() => setMethod(m.k)} style={{ justifyContent: 'center', padding: '9px 6px', fontSize: 12.5 }}>
                  {m.l}
                </button>
              ))}
            </div>
          </div>

          <div className="field">
            <label>Açıklama (opsiyonel)</label>
            <textarea rows="2" value={note} onChange={e => setNote(e.target.value)} placeholder="Örn: Nisan faturası kapatıldı" />
          </div>
        </div>
        <div className="modal-ft">
          <button type="button" className="btn" onClick={onClose}>İptal</button>
          <button type="submit" className="btn btn-primary"><IconCheck size={14} /> Kaydet</button>
        </div>
      </form>
    </div>
  );
}

window.TxModal = TxModal;


// ==== src/app.jsx ====
// App shell — routing, modal state, tweaks, theme persistence.

function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('page') || 'dashboard');
  const [focusCustomer, setFocusCustomer] = React.useState(null);
  const [modal, setModal] = React.useState(null); // { kind, customerId }
  const [toast, setToast] = React.useState(null);
  const [globalSearch, setGlobalSearch] = React.useState('');
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [theme, setTheme] = React.useState(() => {
    try { return JSON.parse(document.getElementById('tweak-defaults').textContent.match(/\{.*\}/s)[0]).theme || 'light'; } catch { return 'light'; }
  });

  React.useEffect(() => { localStorage.setItem('page', page); }, [page]);
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  // Globals used by Sidebar quick actions and cross-component hooks
  window.__nav = setPage;
  window.__openModal = (kind, customerId) => setModal({ kind, customerId });

  // Edit-mode protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksVisible(true);
      if (d.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setKey = (k, v) => {
    if (k === 'theme') setTheme(v);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const nav = (p) => { setPage(p); setFocusCustomer(null); };
  const openCustomer = (id) => { setFocusCustomer(id); setPage('cari'); };
  const openEkstre = (id) => { setFocusCustomer(id); setPage('ekstre'); };

  const pageMeta = {
    dashboard: { title: 'Panel', crumb: 'Genel Bakış' },
    cariler: { title: 'Cari Kartlar', crumb: 'Cariler' },
    cari: { title: 'Cari Kart Detayı', crumb: 'Cariler / Detay' },
    ekstre: { title: 'Hesap Ekstresi', crumb: 'Cariler / Ekstre' },
    rapor: { title: 'Raporlar', crumb: 'Raporlama' },
  };
  const meta = pageMeta[page] || pageMeta.dashboard;

  return (
    <div id="root" data-screen-label={page}>
      <Sidebar page={page === 'cari' ? 'cariler' : page} onNav={nav} />
      <div className="main">
        <Topbar title={meta.title} crumb={meta.crumb} onSearch={setGlobalSearch} searchValue={globalSearch} />
        <div className="content">
          {page === 'dashboard' && <Dashboard onOpenCustomer={openCustomer} />}
          {page === 'ekstre' && <Ekstre initialCustomerId={focusCustomer} search={globalSearch} onOpenCustomer={openCustomer} />}
          {page === 'cariler' && <CariListPage onOpen={openCustomer} search={globalSearch} />}
          {page === 'cari' && <CustomerDetail customerId={focusCustomer || CUSTOMERS[0].id} onOpenEkstre={openEkstre} onBack={() => nav('cariler')} />}
          {page === 'rapor' && <Report />}
        </div>
      </div>

      {modal && <TxModal kind={modal.kind} customerId={modal.customerId} onClose={() => setModal(null)} onSaved={(m) => { setModal(null); setToast(m); }} />}
      {toast && <Toast message={toast} onDone={() => setToast(null)} />}

      {tweaksVisible && (
        <div className="tweaks">
          <div>
            <div className="tweak-ttl">Tweaks</div>
            <div style={{ fontSize: 13, fontWeight: 500, marginTop: 2 }}>Tema</div>
          </div>
          <div className="hstack" style={{ gap: 8 }}>
            <IconSun size={15} style={{ color: theme === 'light' ? 'var(--text)' : 'var(--text-dim)' }} />
            <button className={`toggle ${theme === 'dark' ? 'on' : ''}`} onClick={() => setKey('theme', theme === 'dark' ? 'light' : 'dark')} aria-label="Tema değiştir" />
            <IconMoon size={15} style={{ color: theme === 'dark' ? 'var(--text)' : 'var(--text-dim)' }} />
          </div>
        </div>
      )}
    </div>
  );
}

// Simple list page for "Cariler"
function CariListPage({ onOpen, search }) {
  const q = (search || '').toLowerCase().trim();
  let list = CUSTOMERS;
  if (q) list = list.filter(c => (c.name + ' ' + c.code + ' ' + c.city).toLowerCase().includes(q));
  const [sort, setSort] = React.useState('name');
  list = [...list].sort((a, b) => {
    if (sort === 'balance') return b.balance - a.balance;
    if (sort === 'city') return a.city.localeCompare(b.city);
    return a.name.localeCompare(b.name);
  });

  return (
    <div>
      <div className="filterbar">
        <div className="seg">
          <button className={sort === 'name' ? 'active' : ''} onClick={() => setSort('name')}>İsim</button>
          <button className={sort === 'balance' ? 'active' : ''} onClick={() => setSort('balance')}>Bakiye</button>
          <button className={sort === 'city' ? 'active' : ''} onClick={() => setSort('city')}>Şehir</button>
        </div>
        <div className="flt"><IconFilter size={14} /><span>Tüm Durumlar</span><IconChevDown size={13} /></div>
        <div className="grow" />
        <button className="btn btn-sm"><IconXls size={14} /> Excel</button>
        <button className="btn btn-sm btn-primary"><IconPlus size={14} /> Yeni Cari</button>
      </div>
      <div className="card">
        <div className="tbl-wrap">
          <table className="tbl">
            <thead>
              <tr>
                <th>Cari Kodu</th>
                <th>Ünvan</th>
                <th>Şehir</th>
                <th>Son İşlem</th>
                <th>Durum</th>
                <th>Kredi Kullanımı</th>
                <th className="td-right">Bakiye</th>
                <th style={{ width: 1 }}></th>
              </tr>
            </thead>
            <tbody>
              {list.map(c => {
                const usage = Math.max(0, c.balance) / c.credit;
                return (
                  <tr key={c.id} onClick={() => onOpen(c.id)}>
                    <td className="num" style={{ color: 'var(--text-dim)' }}>{c.code}</td>
                    <td style={{ fontWeight: 500 }}>{c.name}</td>
                    <td style={{ color: 'var(--text-soft)' }}>{c.city}</td>
                    <td className="td-date">{fmtDate(c.lastActivity)}</td>
                    <td><Chip kind={c.status === 'active' ? 'green' : 'neutral'}>{c.status === 'active' ? 'Aktif' : 'Pasif'}</Chip></td>
                    <td>
                      <div className="hstack" style={{ gap: 8, minWidth: 140 }}>
                        <div style={{ flex: 1, height: 5, background: 'var(--panel-soft)', borderRadius: 999, overflow: 'hidden' }}>
                          <div style={{ height: '100%', width: `${Math.min(100, usage * 100)}%`, background: usage > 0.8 ? 'var(--danger)' : usage > 0.5 ? 'var(--warn)' : 'var(--accent)' }} />
                        </div>
                        <span className="num muted" style={{ fontSize: 11.5, width: 36 }}>%{(usage * 100).toFixed(0)}</span>
                      </div>
                    </td>
                    <td className="td-num" style={{ fontWeight: 600, color: c.balance < 0 ? 'var(--danger)' : 'var(--text)' }}>{fmtTL(c.balance)}</td>
                    <td><IconChevRight size={14} style={{ color: 'var(--text-dim)' }} /></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

window.App = App;
window.CariListPage = CariListPage;

ReactDOM.createRoot(document.getElementById('app')).render(<App />);


</script>
</body>
